<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Details — PublicDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --ff:'Bricolage Grotesque',sans-serif;--fm:'DM Mono',monospace;
  --bg:#F7F8FC;--surface:#FFFFFF;--surface2:#F2F3F8;--surface3:#E8EAF2;--surface4:#DDE0EE;
  --border:rgba(0,0,0,.07);--border2:rgba(0,0,0,.12);--border3:rgba(0,0,0,.18);
  --t1:#0A0C14;--t2:#4A4F6A;--t3:#8B90AB;--t4:#C2C6DB;
  --up:#0EA66A;--upb:rgba(14,166,106,.12);--upbr:rgba(14,166,106,.25);
  --dn:#E8334A;--dnb:rgba(232,51,74,.1);--dnbr:rgba(232,51,74,.22);
  --accent:#1A56DB;--accentb:rgba(26,86,219,.1);
  --sha-sm:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.04);
  --sha:0 2px 12px rgba(0,0,0,.07),0 8px 30px rgba(0,0,0,.05);
  --sha-lg:0 12px 40px rgba(0,0,0,.12),0 4px 14px rgba(0,0,0,.06);
  --r:14px;--rs:10px;--rx:7px;--pill:999px;--nav-h:62px;
}
[data-theme="dark"]{
  --bg:#0B0C11;--surface:#12141C;--surface2:#181A24;--surface3:#1F2130;--surface4:#272A3B;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.10);--border3:rgba(255,255,255,.16);
  --t1:#F0F1F8;--t2:#8C91AD;--t3:#505570;--t4:#2E3148;
  --sha-sm:0 1px 3px rgba(0,0,0,.3),0 2px 8px rgba(0,0,0,.2);
  --sha:0 2px 12px rgba(0,0,0,.4),0 8px 30px rgba(0,0,0,.3);
  --sha-lg:0 12px 40px rgba(0,0,0,.5),0 4px 14px rgba(0,0,0,.3);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s;}
a{text-decoration:none;color:inherit;}
button{font-family:inherit;cursor:pointer;}

/* NAV */
nav{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500;box-shadow:var(--sha-sm);}
.nav-inner{max-width:1500px;margin:0 auto;padding:0 24px;height:var(--nav-h);display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.logo-mk{width:32px;height:32px;background:var(--t1);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.logo-mk svg{width:18px;height:18px;}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-.5px;color:var(--t1);}
.logo-name span{color:var(--t3);font-weight:400;}
.back-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--pill);border:1.5px solid var(--border2);color:var(--t2);font-size:13px;font-weight:700;background:transparent;transition:all .15s;white-space:nowrap;}
.back-btn:hover{border-color:var(--border3);color:var(--t1);background:var(--surface2);}
.nav-r{display:flex;gap:8px;margin-left:auto;align-items:center;}
.btn-s{padding:7px 16px;border-radius:var(--pill);background:var(--t1);color:var(--bg);font-size:13px;font-weight:700;border:none;transition:opacity .15s;}
.btn-s:hover{opacity:.86;}
.btn-o{padding:7px 14px;border-radius:var(--pill);background:transparent;border:1.5px solid var(--border3);color:var(--t1);font-size:13px;font-weight:700;transition:all .15s;}
.btn-o:hover{background:var(--surface2);}

/* MENU */
.menu-wrap{position:relative;}
.menu-btn{width:36px;height:36px;border-radius:var(--rx);border:1.5px solid var(--border2);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.menu-btn:hover,.menu-btn.open{border-color:var(--border3);background:var(--surface3);}
.menu-icon{display:flex;flex-direction:column;gap:4px;width:16px;}
.menu-icon span{display:block;height:2px;background:var(--t2);border-radius:2px;transition:all .2s;}
.menu-btn.open .menu-icon span:nth-child(1){transform:translateY(6px) rotate(45deg);}
.menu-btn.open .menu-icon span:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open .menu-icon span:nth-child(3){transform:translateY(-6px) rotate(-45deg);}
.menu-dd{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1.5px solid var(--border2);border-radius:var(--r);box-shadow:var(--sha-lg);min-width:210px;padding:6px;z-index:600;opacity:0;transform:translateY(-8px) scale(.97);pointer-events:none;transition:all .2s cubic-bezier(.34,1.56,.64,1);}
.menu-dd.open{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
.menu-item{display:flex;align-items:center;gap:9px;width:100%;padding:9px 12px;border-radius:var(--rx);font-size:13.5px;font-weight:600;color:var(--t1);background:transparent;border:none;cursor:pointer;text-decoration:none;transition:background .12s;font-family:var(--ff);text-align:left;}
.menu-item:hover{background:var(--surface2);}
.menu-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.menu-sep{height:1px;background:var(--border);margin:5px 0;}

/* PAGE */
.page{max-width:1500px;margin:0 auto;padding:24px 24px 80px;}

/* BREADCRUMB */
.bc{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12.5px;color:var(--t3);flex-wrap:wrap;}
.bc a{color:var(--t3);font-weight:600;transition:color .15s;}
.bc a:hover{color:var(--t1);}
.bc-sep{color:var(--t4);}

/* COIN HERO */
.coin-hero{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:20px;box-shadow:var(--sha-sm);position:relative;overflow:hidden;}
.coin-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),#6366F1);z-index:1;}
.ch-top{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:24px;}
.ch-left{display:flex;align-items:flex-start;gap:18px;min-width:0;flex:1;}
.ch-img{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--surface3);flex-shrink:0;border:2px solid var(--border2);}
.ch-info{min-width:0;flex:1;}
.ch-badges{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--pill);}
.badge-sym{background:var(--surface3);color:var(--t2);border:1px solid var(--border2);font-family:var(--fm);}
.badge-rank{background:var(--surface2);color:var(--t3);border:1px solid var(--border);}
.badge-live{background:rgba(14,166,106,.12);color:var(--up);border:1px solid rgba(14,166,106,.25);}
.badge-wss{background:rgba(26,86,219,.1);color:var(--accent);border:1px solid rgba(26,86,219,.2);font-family:var(--fm);font-size:10px;}
.ch-name{font-size:26px;font-weight:800;letter-spacing:-.8px;margin-bottom:8px;line-height:1;}
.ch-price{font-size:36px;font-weight:800;letter-spacing:-1.5px;margin-bottom:6px;line-height:1;}
.ch-price-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.chg-pill{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:var(--pill);font-size:13px;font-weight:700;font-family:var(--fm);}
.chg-up{background:var(--upb);color:var(--up);border:1px solid var(--upbr);}
.chg-dn{background:var(--dnb);color:var(--dn);border:1px solid var(--dnbr);}
.ch-actions{display:flex;gap:8px;align-items:flex-start;flex-shrink:0;flex-wrap:wrap;}
.wl-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--t4);transition:all .15s;}
.wl-btn:hover{border-color:#F59E0B;color:#F59E0B;}
.wl-btn.on{color:#F59E0B;border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.07);}
.up-c{color:var(--up);}
.dn-c{color:var(--dn);}

/* ALERT BUTTONS */
.alert-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.alert-btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--pill);font-size:12px;font-weight:700;border:1.5px solid var(--border2);background:var(--surface2);color:var(--t2);transition:all .18s;cursor:pointer;}
.alert-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accentb);}
.alert-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accentb);}
.alert-btn .dot{width:7px;height:7px;border-radius:50%;background:var(--t4);display:inline-block;transition:background .15s;}
.alert-btn.active .dot{background:var(--accent);box-shadow:0 0 0 3px rgba(26,86,219,.15);}

/* RANGE BAR */
.range-bar{margin-bottom:22px;}
.rb-labels{display:flex;justify-content:space-between;font-size:11.5px;font-family:var(--fm);color:var(--t3);margin-bottom:6px;}
.rb-track{height:6px;background:var(--surface3);border-radius:3px;position:relative;overflow:visible;}
.rb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--dn),#F59E0B,var(--up));}
.rb-thumb{position:absolute;top:50%;width:14px;height:14px;background:var(--surface);border-radius:50%;transform:translateY(-50%);border:2.5px solid var(--t1);box-shadow:var(--sha-sm);}

/* QUICK STATS */
.quick-stats{display:grid;grid-template-columns:repeat(6,1fr);border-top:1px solid var(--border);}
.qs{padding:16px 18px;border-right:1px solid var(--border);}
.qs:last-child{border-right:none;}
.qs-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:5px;}
.qs-val{font-family:var(--fm);font-size:14px;font-weight:600;color:var(--t1);}
.qs-sub{font-size:10.5px;color:var(--t4);margin-top:2px;font-family:var(--fm);}

/* LAYOUT */
.coin-layout{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sha-sm);}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--border);gap:10px;}
.card-title{font-size:15px;font-weight:800;letter-spacing:-.3px;}
.card-body{padding:20px;}

/* INTERVAL PILLS */
.int-pills{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--pill);}
.ip{padding:5px 11px;border-radius:var(--pill);font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:var(--ff);transition:all .15s;white-space:nowrap;}
.ip:hover{color:var(--t1);}
.ip.active{background:var(--surface);color:var(--t1);box-shadow:var(--sha-sm);}

/* CHART */
.chart-wrap{height:310px;position:relative;}
.chart-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--surface);z-index:2;}
.spinner{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.chart-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
.cs-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rx);padding:11px 13px;}
.cs-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:4px;}
.cs-v{font-family:var(--fm);font-size:14px;font-weight:600;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 20px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:12px 16px;font-size:13.5px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;font-family:var(--ff);}
.tab-btn:hover{color:var(--t1);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-pane{display:none;padding:20px;}
.tab-pane.active{display:block;}

/* SIDEBAR */
.side-row{display:flex;align-items:center;justify-content:space-between;padding:11px 18px;border-bottom:1px solid var(--border);}
.side-row:last-child{border-bottom:none;}
.side-key{font-size:12.5px;color:var(--t2);font-weight:500;}
.side-val{font-family:var(--fm);font-size:13px;font-weight:700;text-align:right;}

/* CONVERTER */
.cv-box{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);padding:14px 16px;margin-bottom:10px;}
.cv-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);font-weight:700;margin-bottom:7px;}
.cv-input-row{display:flex;align-items:center;gap:8px;}
.cv-input{flex:1;background:transparent;border:none;outline:none;font-family:var(--ff);font-size:22px;font-weight:800;color:var(--t1);min-width:0;}
.cv-tag{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--surface3);border-radius:var(--pill);font-size:12px;font-weight:700;font-family:var(--fm);color:var(--t2);flex-shrink:0;}
.cv-swap{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t2);transition:all .2s;margin:6px auto;}
.cv-swap:hover{background:var(--surface4);color:var(--t1);transform:rotate(180deg);}
.cv-select{width:100%;padding:9px 12px;background:var(--surface3);border:1.5px solid var(--border2);border-radius:var(--rx);color:var(--t1);font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;outline:none;margin-top:6px;}
.cv-result{background:var(--t1);color:var(--bg);border-radius:var(--rs);padding:18px;text-align:center;}
.cv-res-label{font-size:11px;opacity:.6;text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.cv-res-val{font-size:26px;font-weight:800;letter-spacing:-.8px;}
.cv-res-sub{font-size:11px;opacity:.5;margin-top:3px;font-family:var(--fm);}
.quick-rates{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px;}
.qr-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rx);padding:9px 10px;text-align:center;}
.qr-flag{font-size:16px;margin-bottom:3px;}
.qr-cur{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:2px;}
.qr-val{font-family:var(--fm);font-size:12.5px;font-weight:600;}

/* ORDER BOOK — DUAL EXCHANGE */
.ob-exchange-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:14px;}
.ob-ex-tab{flex:1;padding:10px 8px;font-size:12.5px;font-weight:700;border:none;background:transparent;cursor:pointer;color:var(--t3);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .14s;font-family:var(--ff);display:flex;align-items:center;justify-content:center;gap:6px;}
.ob-ex-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.ob-ex-tab .ws-dot{width:6px;height:6px;border-radius:50%;background:var(--t4);display:inline-block;}
.ob-ex-tab.active .ws-dot{background:var(--up);box-shadow:0 0 0 2px rgba(14,166,106,.2);}
.ob-ex-panel{display:none;}
.ob-ex-panel.active{display:block;}
.ob-header{display:grid;grid-template-columns:1fr 1fr 70px;padding:6px 0;border-bottom:1px solid var(--border);}
.ob-head-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-family:var(--fm);}
.ob-head-lbl:nth-child(2),.ob-head-lbl:nth-child(3){text-align:right;}
.ob-row{display:grid;grid-template-columns:1fr 1fr 70px;position:relative;font-family:var(--fm);font-size:12px;padding:4px 0;cursor:default;}
.ob-row:hover .ob-row-bg{opacity:.12!important;}
.ob-row-bg{position:absolute;inset:0;opacity:.06;pointer-events:none;transition:opacity .1s;}
.ob-price{font-weight:700;}
.ob-qty{text-align:right;color:var(--t2);}
.ob-total{text-align:right;color:var(--t3);}
.ob-spread-bar{display:flex;align-items:center;gap:8px;padding:8px 0;margin:6px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);background:var(--surface2);border-radius:var(--rx);padding:8px 12px;}
.ob-spread-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);flex-shrink:0;}
.ob-spread-val{font-family:var(--fm);font-size:12px;font-weight:700;color:var(--t2);}
.ob-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.ob-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.ob-footer{margin-top:10px;text-align:center;font-size:11.5px;color:var(--t3);display:flex;align-items:center;justify-content:center;gap:6px;}
.ob-wss-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--pill);background:rgba(14,166,106,.1);color:var(--up);border:1px solid rgba(14,166,106,.2);}
.ob-wss-badge .pulse{width:5px;height:5px;border-radius:50%;background:var(--up);display:inline-block;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* STALE BANNER */
.stale-banner{display:none;margin-bottom:10px;padding:8px 12px;border-radius:var(--rx);background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);font-size:12px;font-weight:600;color:#D97706;align-items:center;gap:7px;}
.stale-banner.show{display:flex;}

/* STATS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.sg-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rx);padding:12px 14px;}
.sg-l{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:4px;}
.sg-v{font-family:var(--fm);font-size:14px;font-weight:600;}

/* SHARE MODAL */
.share-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:800;opacity:0;pointer-events:none;transition:opacity .22s ease;}
.share-backdrop.open{opacity:1;pointer-events:auto;}
.share-modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-54%) scale(.94);z-index:801;width:min(440px,calc(100vw - 28px));background:var(--surface);border:1.5px solid var(--border2);border-radius:20px;box-shadow:var(--sha-lg);padding:28px 26px 24px;opacity:0;pointer-events:none;transition:all .28s cubic-bezier(.34,1.4,.64,1);}
.share-modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1);}
.share-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:12px;}
.share-coin{display:flex;align-items:center;gap:12px;min-width:0;}
.share-coin-img{width:46px;height:46px;border-radius:50%;object-fit:cover;background:var(--surface3);flex-shrink:0;border:2px solid var(--border2);}
.share-coin-name{font-size:17px;font-weight:800;letter-spacing:-.4px;}
.share-coin-sub{font-size:12px;color:var(--t3);margin-top:3px;font-family:var(--fm);}
.share-close{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border2);background:var(--surface2);color:var(--t3);font-size:15px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.share-close:hover{background:var(--surface3);color:var(--t1);border-color:var(--border3);}
.share-url-row{background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rs);padding:11px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.share-url-icon{font-size:16px;flex-shrink:0;}
.share-url-text{font-family:var(--fm);font-size:12px;color:var(--t2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

.share-copy-btn:hover{opacity:.85;}
.share-copy-btn.copied{background:var(--up);color:#fff;}
.share-div{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.share-div::before,.share-div::after{content:'';flex:1;height:1px;background:var(--border);}

#toast.show{transform:translateX(-50%) translateY(0);}

/* LOADING & ERROR */
.loading-page{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;}
.loading-page .spinner{width:44px;height:44px;border-width:3px;}
.loading-dots{display:flex;gap:6px;}
.loading-dot{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:dotpulse 1.2s ease-in-out infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes dotpulse{0%,80%,100%{transform:scale(0);opacity:.4}40%{transform:scale(1);opacity:1}}
.err-page{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:10px;text-align:center;padding:32px;}

/* PRICE FLASH */
@keyframes flashUp{0%{background:rgba(14,166,106,.25)}100%{background:transparent}}
@keyframes flashDn{0%{background:rgba(232,51,74,.2)}100%{background:transparent}}
.flash-up{animation:flashUp .6s ease-out;}
.flash-dn{animation:flashDn .6s ease-out;}

/* ANIMATIONS */
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS & GLOBALS
════════════════════════════════════════════════════════ */
const RATES={USD:1,INR:83.5,EUR:.92,GBP:.79,AED:3.67,JPY:149.5,SGD:1.34,CAD:1.36,AUD:1.52};
const RSYM={USD:'$',INR:'₹',EUR:'€',GBP:'£',AED:'AED ',JPY:'¥',SGD:'S$',CAD:'C$',AUD:'A$'};
const RNAME={USD:'US Dollar',INR:'Indian Rupee',EUR:'Euro',GBP:'British Pound',AED:'UAE Dirham',JPY:'Japanese Yen',SGD:'Singapore Dollar',CAD:'Canadian Dollar',AUD:'Australian Dollar'};
const NAME_MAP={BTC:'Bitcoin',ETH:'Ethereum',BNB:'BNB',SOL:'Solana',XRP:'XRP',ADA:'Cardano',DOGE:'Dogecoin',MATIC:'Polygon',DOT:'Polkadot',LTC:'Litecoin',AVAX:'Avalanche',LINK:'Chainlink',UNI:'Uniswap',ATOM:'Cosmos',SHIB:'Shiba Inu',TRX:'TRON',NEAR:'NEAR Protocol',FIL:'Filecoin',APT:'Aptos',SUI:'Sui',OP:'Optimism',ARB:'Arbitrum',INJ:'Injective',WLD:'Worldcoin',PEPE:'Pepe',WIF:'dogwifhat',FLOKI:'FLOKI',BONK:'Bonk',AAVE:'Aave',CRV:'Curve DAO',MKR:'Maker',RNDR:'Render',FET:'Fetch.ai',AGIX:'SingularityNET',OCEAN:'Ocean Protocol',LDO:'Lido DAO',IMX:'Immutable X',AXS:'Axie Infinity',SAND:'The Sandbox',MANA:'Decentraland',ENJ:'Enjin Coin',GALA:'Gala',APE:'ApeCoin',BCH:'Bitcoin Cash',ETC:'Ethereum Classic',XMR:'Monero',XLM:'Stellar',VET:'VeChain',HBAR:'Hedera',ALGO:'Algorand',EGLD:'MultiversX',THETA:'Theta',FTM:'Fantom',ICP:'Internet Computer',FLOW:'Flow',EOS:'EOS',CHZ:'Chiliz',HOT:'Holo',BAT:'Basic Attention',NOT:'Notcoin',TIA:'Celestia',SEI:'Sei',GMX:'GMX',DYDX:'dYdX',TON:'Toncoin',STX:'Stacks',GRT:'The Graph'};

const WL = new Set(JSON.parse(localStorage.getItem('pd_wl')||'[]'));
const params = new URLSearchParams(location.search);
const PAIR  = params.get('pair') || 'BTCUSDT';
const SYM   = PAIR.replace(/USDT$/i,'');
const NAME  = NAME_MAP[SYM] || SYM;

let cvPrice = 0, chartInst = null, curInterval = '1d', _lastTicker = null;

/* ── ALERT STATE ─────────────────────────────────── */
const ALERT = { enabled: false, lastPrice: 0 };

/* ── THEME ───────────────────────────────────────── */
const savedTheme = localStorage.getItem('pd_theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('THEME_IC').textContent = savedTheme === 'dark' ? '☀️' : '🌙';
function toggleTheme(){
  const n = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', n);
  localStorage.setItem('pd_theme', n);
  document.getElementById('THEME_IC').textContent = n === 'dark' ? '☀️' : '🌙';
  if(chartInst) loadChart(curInterval, null);
}

/* ── TOAST ───────────────────────────────────────── */
function toast(m, dur=3000){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), dur);
}
function dt(f){ toast(`🚧 "${f}" — Coming Soon`); }

/* ── MENU ────────────────────────────────────────── */
function toggleMenu(){
  document.getElementById('MENU_BTN').classList.toggle('open');
  document.getElementById('MENU_DD').classList.toggle('open');
}

  document.getElementById('MENU_BTN').classList.remove('open');
  document.getElementById('MENU_DD').classList.remove('open');
}
document.addEventListener('click', e=>{
  const w = document.querySelector('.menu-wrap');
  if(w && !w.contains(e.target)) closeMenu();
});

/* ── FORMAT ──────────────────────────────────────── */
function fmtP(n){
  if(n==null||isNaN(n)) return '—'; n = parseFloat(n);
  if(n>=1e6)  return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0});
  if(n>=10000) return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0});
  if(n>=1000) return '$'+n.toLocaleString('en-US',{maximumFractionDigits:2});
  if(n>=1)    return '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
  if(n>=0.01) return '$'+n.toFixed(5);
  if(n>=0.0001) return '$'+n.toFixed(7);
  return '$'+n.toPrecision(4);
}
function fmtV(n){
  n=parseFloat(n); if(!n||isNaN(n)) return '—';
  if(n>=1e9) return '$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6) return '$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3) return '$'+(n/1e3).toFixed(1)+'K';
  return '$'+n.toFixed(2);
}
function fn(n,d=2){ return (n!=null&&!isNaN(n)) ? parseFloat(n).toLocaleString('en-US',{maximumFractionDigits:d}) : '—'; }
function coinImg(sym){ return `https://assets.coincap.io/assets/icons/${sym.toLowerCase()}@2x.png`; }

/* ═══════════════════════════════════════════════════
   BINANCE REST (multi-host fallback, visitor's IP)
═══════════════════════════════════════════════════ */
const B_HOSTS = ['api.binance.com','api1.binance.com','api2.binance.com','api3.binance.com'];
let _bHost = 0;
async function bFetch(path, ms=8000){
  for(let i=0; i<B_HOSTS.length; i++){
    const host = B_HOSTS[(_bHost+i) % B_HOSTS.length];
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), ms);
    try{
      const res  = await fetch(`https://${host}${path}`, {signal:ctrl.signal});
      clearTimeout(tid);
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      _bHost = (_bHost+i) % B_HOSTS.length;
      return data;
    }catch(e){
      clearTimeout(tid);
      if(i === B_HOSTS.length-1) throw new Error(`All Binance endpoints failed. ${e.message||''}`);
    }
  }
}

/* ═══════════════════════════════════════════════════
   PRICE ALERT ENGINE
   Uses Web Notifications API (browser push to user)
═══════════════════════════════════════════════════ */
async function requestNotifPermission(){
  if(!('Notification' in window)) return false;
  if(Notification.permission === 'granted') return true;
  if(Notification.permission === 'denied') return false;
  const p = await Notification.requestPermission();
  return p === 'granted';
}

function sendPriceAlert(exchange, price, prevPrice){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  const dir  = price > prevPrice ? '▲' : '▼';
  const diff = Math.abs(((price - prevPrice)/prevPrice)*100).toFixed(3);
  const body = `${dir} ${fmtP(price)}  (${diff}% change)\n${exchange} · ${SYM}/USDT`;
  try{
    new Notification(`🔔 ${NAME} Price Update`, {
      body,
      icon: coinImg(SYM),
      tag:  `pd-alert-${exchange}-${SYM}`,  // replace previous from same exchange
      silent: false
    });
  }catch(e){}
}

async function toggleAlert(btnEl){
  if(ALERT.enabled){
    ALERT.enabled = false;
    btnEl.classList.remove('active');
    btnEl.title = `Enable price alerts`;
    toast(`🔕 Price alerts off`);
    return;
  }
  const ok = await requestNotifPermission();
  if(!ok){
    toast('⚠️ Please allow notifications in your browser settings');
    return;
  }
  ALERT.enabled = true;
  ALERT.lastPrice = cvPrice;
  btnEl.classList.add('active');
  btnEl.title = `Disable price alerts`;
  toast(`🔔 Price alerts ON for ${SYM}`);
}

/* Called whenever a new price arrives from any exchange */
function handlePriceUpdate(exchange, newPrice){
  if(!ALERT.enabled) return;
  if(ALERT.lastPrice === 0){ ALERT.lastPrice = newPrice; return; }
  if(newPrice === ALERT.lastPrice) return;
  sendPriceAlert(exchange, newPrice, ALERT.lastPrice);
  ALERT.lastPrice = newPrice;
}

/* ═══════════════════════════════════════════════════
   BINANCE WebSocket — ticker + order book (wss://)
   All connections are from visitor's browser directly
═══════════════════════════════════════════════════ */
const BN_WSS = {
  ws: null,
  book: { bids: [], asks: [] },
  connected: false,

  start(){
    if(this.ws) try{ this.ws.close(); }catch(e){}
    const sym = PAIR.toLowerCase();
    // Combined stream: depth + ticker
    const url = `wss://stream.binance.com:9443/stream?streams=${sym}@depth20@1000ms/${sym}@miniTicker`;
    try{
      this.ws = new WebSocket(url);
      this.ws.onopen  = ()=>{ this.connected = true; updateWsStatus('binance', true); };
      this.ws.onclose = ()=>{ this.connected = false; updateWsStatus('binance', false); setTimeout(()=>this.start(), 3000); };
      this.ws.onerror = ()=>{ this.connected = false; };
      this.ws.onmessage = (e)=>{
        try{
          const frame = JSON.parse(e.data);
          const stream = frame.stream || '';
          const data   = frame.data || frame;

          if(stream.includes('depth') || data.lastUpdateId){
            // Order book update — normalize to [price, qty] arrays, top 12 each
            const bids = (data.bids||[]).slice(0,12).map(r=>[r[0],r[1]]);
            const asks = (data.asks||[]).slice(0,12).map(r=>[r[0],r[1]]);
            this.book = { bids, asks };
            if(OB_STATE.active === 'binance') OB_STATE.paintPanel('binance', bids, asks);
          }
          if(stream.includes('miniTicker') || data.c){
            // Price tick
            const p = parseFloat(data.c);
            if(p > 0){
              handlePriceUpdate('binance', p);
              // Update live price in hero if this is primary exchange
              cvPrice = p;
              const el = document.getElementById('LIVE_PRICE');
              if(el){
                const prev = parseFloat(el.dataset.prev || p);
                el.textContent = fmtP(p);
                el.dataset.prev = p;
                el.classList.remove('flash-up','flash-dn');
                void el.offsetWidth;
                if(p > prev) el.classList.add('flash-up');
                else if(p < prev) el.classList.add('flash-dn');
              }
            }
          }
        }catch(err){}

/* ═══════════════════════════════════════════════════
   BITGET WebSocket — order book (wss://)
   Public endpoint, visitor's IP fetches directly
═══════════════════════════════════════════════════ */
const BG_WSS = {
  ws: null,
  book: { bids: [], asks: [] },
  connected: false,
  pingTimer: null,

  start(){
    if(this.ws) try{ this.ws.close(); }catch(e){}
    clearInterval(this.pingTimer);
    try{
      this.ws = new WebSocket('wss://ws.bitget.com/v2/ws/public');
      this.ws.onopen  = ()=>{
        this.connected = true;
        updateWsStatus('bitget', true);
        // Subscribe to order book
        const instId = SYM + 'USDT';
        this.ws.send(JSON.stringify({op:'subscribe', args:[{instType:'SPOT',channel:'books15',instId}]}));
        // Keepalive ping every 25s (Bitget requires ping)
        this.pingTimer = setInterval(()=>{ if(this.ws && this.ws.readyState===1) this.ws.send('ping'); }, 25000);
      };
      this.ws.onclose = ()=>{
        this.connected = false;
        clearInterval(this.pingTimer);
        updateWsStatus('bitget', false);
        setTimeout(()=>this.start(), 4000);
      };
      this.ws.onerror = ()=>{ this.connected = false; };
      this.ws.onmessage = (e)=>{
        try{
          if(e.data === 'pong') return;
          const frame = JSON.parse(e.data);
          if(frame.action && (frame.action==='snapshot'||frame.action==='update') && frame.data?.[0]){
            const d    = frame.data[0];
            const bids = (d.bids||[]).slice(0,12).map(r=>[r[0],r[1]]);
            const asks = (d.asks||[]).slice(0,12).map(r=>[r[0],r[1]]);
            this.book  = { bids, asks };
            if(OB_STATE.active === 'bitget') OB_STATE.paintPanel('bitget', bids, asks);

            // Price alert for bitget best bid mid
            const bestBid = parseFloat(bids[0]?.[0]||0);
            const bestAsk = parseFloat(asks[0]?.[0]||0);
            if(bestBid && bestAsk){
              const mid = (bestBid + bestAsk) / 2;
              handlePriceUpdate('bitget', mid);
            }
          }
        }catch(err){}
      };
    }catch(e){ setTimeout(()=>this.start(), 5000); }
  }
};

/* ═══════════════════════════════════════════════════
   ORDER BOOK STATE MANAGER
   Manages the two-tab UI (Binance / Bitget)
   Each tab shows last 12 bids & 12 asks separately
═══════════════════════════════════════════════════ */
const OB_STATE = {
  active: 'binance',  // 'binance' | 'bitget'

  switchTab(exchange){
    this.active = exchange;
    document.querySelectorAll('.ob-ex-tab').forEach(t=>{
      t.classList.toggle('active', t.dataset.ex === exchange);
    });
    document.querySelectorAll('.ob-ex-panel').forEach(p=>{
      p.classList.toggle('active', p.dataset.ex === exchange);
    });
    // Paint immediately from cached book
    const src = exchange === 'binance' ? BN_WSS : BG_WSS;
    if(src.book.bids.length) this.paintPanel(exchange, src.book.bids, src.book.asks);
  },

  paintPanel(exchange, bids, asks){
    const prefix = exchange === 'binance' ? 'BN' : 'BG';
    const bEl  = document.getElementById(`OB_${prefix}_BIDS`);
    const aEl  = document.getElementById(`OB_${prefix}_ASKS`);
    const spEl = document.getElementById(`OB_${prefix}_SPREAD`);
    if(!bEl) return;

    bEl.innerHTML = renderBook(bids.slice(0,12), 'up');
    aEl.innerHTML = renderBook(asks.slice(0,12), 'dn');

    const bestBid = parseFloat(bids[0]?.[0]||0);
    const bestAsk = parseFloat(asks[0]?.[0]||0);
    if(bestBid && bestAsk){
      const spread    = bestAsk - bestBid;
      const spreadPct = (spread / bestAsk * 100).toFixed(4);
      if(spEl) spEl.innerHTML = `<span class="ob-spread-lbl">Spread</span><span class="ob-spread-val">${fmtP(spread)} · ${spreadPct}%</span>`;
    }
  }
};

/* ── Render order book rows (top N) ─────────────── */
function renderBook(orders, side){
  if(!orders||!orders.length) return '<div style="color:var(--t3);font-size:12px;padding:8px 0">Connecting…</div>';
  const maxQ = Math.max(...orders.map(o=>parseFloat(o[1])));
  return orders.map(o=>{
    const price = parseFloat(o[0]), qty = parseFloat(o[1]), total = price*qty;
    const pct   = (qty/maxQ*100).toFixed(1);
    return `<div class="ob-row">
      <div class="ob-row-bg" style="width:${pct}%;background:${side==='up'?'var(--up)':'var(--dn)'}"></div>
      <div class="ob-price" style="color:${side==='up'?'var(--up)':'var(--dn)'}">${price.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:6})}</div>
      <div class="ob-qty">${qty.toFixed(4)}</div>
      <div class="ob-total">${fmtV(total)}</div>
    </div>`;
  }).join('');
}

function swTab(name, el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tp-'+name)?.classList.add('active');
  el.classList.add('active');
}

async function loadChart(interval, btn){
  document.querySelectorAll('.ip').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.ip').forEach(b=>{ if(b.textContent.trim().toLowerCase()===interval.toLowerCase()) b.classList.add('active'); });
  curInterval = interval;
  const cl = document.getElementById('CHART_LOADER');
  if(cl) cl.style.display = 'flex';
  const lMap = {'15m':96,'1h':72,'4h':90,'1d':90,'1w':52,'1M':36,'3M':90};
  const bInt = interval==='3M' ? '1M' : interval;
  try{
    const klines = await bFetch(`/api/v3/klines?symbol=${PAIR}&interval=${bInt}&limit=${lMap[interval]||90}`);
    if(!Array.isArray(klines)||!klines.length) throw new Error('No data');
    const closes = klines.map(k=>parseFloat(k[4]));
    const vols   = klines.map(k=>parseFloat(k[5]));
    const labels = klines.map(k=>{
      const d = new Date(k[0]);
      if(interval==='15m'||interval==='1h') return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      if(interval==='4h') return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      if(interval==='1d'||interval==='1w') return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      return d.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
    });
    const isUp = closes[closes.length-1] >= closes[0];
    const lc   = isUp ? '#0EA66A' : '#E8334A';
    const fc   = isUp ? 'rgba(14,166,106,.07)' : 'rgba(232,51,74,.06)';
    const dark = document.documentElement.getAttribute('data-theme') === 'dark';
    if(chartInst){ chartInst.destroy(); chartInst = null; }
    const canvas = document.getElementById('PRICE_CHART');
    if(!canvas){ if(cl) cl.style.display = 'none'; return; }
    chartInst = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets:[{data:closes,borderColor:lc,backgroundColor:fc,fill:true,borderWidth:2,pointRadius:0,pointHoverRadius:5,tension:.3}] },
      options: {
        responsive:true, maintainAspectRatio:false,
        interaction:{ mode:'index', intersect:false },
        plugins:{
          legend:{ display:false },
          tooltip:{ backgroundColor:dark?'rgba(18,20,28,.96)':'rgba(10,12,20,.93)',titleColor:'rgba(255,255,255,.5)',bodyColor:'#fff',bodyFont:{family:'DM Mono',weight:'500',size:13},borderColor:'rgba(255,255,255,.1)',borderWidth:1,padding:12,cornerRadius:10,callbacks:{label:c=>'Price: '+fmtP(c.parsed.y)} }
        },
        scales:{
          x:{ grid:{display:false}, ticks:{color:dark?'#505570':'#8B90AB',font:{size:10,family:'DM Mono'},maxTicksLimit:8,maxRotation:0} },
          y:{ grid:{color:dark?'rgba(255,255,255,.05)':'rgba(0,0,0,.04)'}, position:'right', ticks:{color:dark?'#505570':'#8B90AB',font:{size:10,family:'DM Mono'},callback:v=>fmtP(v)} }
        }
      }
    });
    const mn=Math.min(...closes), mx=Math.max(...closes), cp=((closes[closes.length-1]-closes[0])/closes[0]*100), tv=vols.reduce((a,b)=>a+b,0)*cvPrice;
    const cs = document.getElementById('CHART_STATS');
    if(cs) cs.innerHTML=`<div class="cs-box"><div class="cs-l">Period High</div><div class="cs-v up-c">${fmtP(mx)}</div></div><div class="cs-box"><div class="cs-l">Period Low</div><div class="cs-v dn-c">${fmtP(mn)}</div></div><div class="cs-box"><div class="cs-l">Period Change</div><div class="cs-v ${cp>=0?'up-c':'dn-c'}">${cp>=0?'+':''}${cp.toFixed(2)}%</div></div><div class="cs-box"><div class="cs-l">Period Volume</div><div class="cs-v">${fmtV(tv)}</div></div>`;
  }catch(e){
    const cs = document.getElementById('CHART_STATS');
    if(cs) cs.innerHTML=`<div style="color:var(--t3);font-size:13px;grid-column:1/-1;padding:8px 0">Chart unavailable. Try another interval.</div>`;
  }
  if(cl) cl.style.display = 'none';
}

/* ═══════════════════════════════════════════════════
   CONVERTER
═══════════════════════════════════════════════════ */
function calcConv(){
  const amt = parseFloat(document.getElementById('CV_AMT')?.value) || 1;
  const cur = document.getElementById('CV_CUR')?.value || 'INR';
  const r   = RATES[cur]||1, v = amt*cvPrice*r, s = RSYM[cur]||'$';
  const d   = cur==='JPY' ? s+fn(v,0) : s+fn(v,2);
  const rv  = document.getElementById('CV_RES_VAL');
  const rs  = document.getElementById('CV_RES_SUB');
  if(rv) rv.textContent = d;
  if(rs) rs.textContent = `${RNAME[cur]||cur} · ${amt} ${SYM} = ${d}`;
}

═══════════════════════════════════════════════════ */
function toggleWL(){
  const btn = document.getElementById('WL_BTN');
  if(WL.has(PAIR)){ WL.delete(PAIR); if(btn){ btn.textContent='☆'; btn.classList.remove('on'); } toast('Removed from watchlist'); }
  else             { WL.add(PAIR);   if(btn){ btn.textContent='★'; btn.classList.add('on');    } toast('⭐ Added to watchlist!'); }
  localStorage.setItem('pd_wl', JSON.stringify([...WL]));
}

/* ═══════════════════════════════════════════════════
   EXPORT
═══════════════════════════════════════════════════ */
function exportMarketData(){
  if(!_lastTicker){ toast('⚠️ Data not loaded yet'); return; }
  const t = _lastTicker;
  const rows=[['Field','Value'],['Symbol',SYM+'/USDT'],['Name',NAME],['Last Price',t.lastPrice],['24h Change %',t.priceChangePercent],['Price Change',t.priceChange],['24h High',t.highPrice],['24h Low',t.lowPrice],['Open Price',t.openPrice],['Prev Close',t.prevClosePrice],['Weighted Avg',t.weightedAvgPrice],['Best Bid',t.bidPrice],['Best Ask',t.askPrice],['Spread %',((parseFloat(t.askPrice)-parseFloat(t.bidPrice))/parseFloat(t.askPrice)*100).toFixed(6)],['Base Volume ('+SYM+')',t.volume],['Quote Volume (USDT)',t.quoteVolume],['Trade Count',t.count],['Exported At',new Date().toISOString()],['Source','Binance API via publicdrop.in']];
  const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a   = Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:`${SYM}_marketdata_${new Date().toISOString().slice(0,10)}.csv`});
  a.click(); URL.revokeObjectURL(a.href);
  toast('✅ CSV exported!');
}

function openShare(){
  const url = `https://publicdrop.in/coin.html?pair=${PAIR}`;
  const img = coinImg(SYM);
  const fb  = `https://ui-avatars.com/api/?name=${encodeURIComponent(SYM)}&background=random&color=fff&size=64&bold=true&format=svg`;
  const si  = document.getElementById('SHARE_IMG'); si.src=img; si.onerror=()=>{si.src=fb;si.onerror=null;};
  document.getElementById('SHARE_NAME').textContent = `${NAME} (${SYM})`;
  document.getElementById('SHARE_SUB').textContent  = `${fmtP(cvPrice)} · Live on Binance & Bitget`;
  document.getElementById('SHARE_URL_TEXT').textContent = url;
  const cb = document.getElementById('SHARE_COPY_BTN'); cb.classList.remove('copied');
  document.getElementById('SHARE_COPY_LBL').textContent = 'Copy';
  document.getElementById('SHARE_BD').classList.add('open');
  document.getElementById('SHARE_MODAL').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeShare(){
  document.getElementById('SHARE_BD').classList.remove('open');
  document.getElementById('SHARE_MODAL').classList.remove('open');
  document.body.style.overflow = '';
}
function copyShareLink(){
  const url  = `https://publicdrop.in/coin.html?pair=${PAIR}`;
  const done = ()=>{ const b=document.getElementById('SHARE_COPY_BTN'),l=document.getElementById('SHARE_COPY_LBL'); b.classList.add('copied'); l.textContent='✓ Copied!'; setTimeout(()=>{ b.classList.remove('copied'); l.textContent='Copy'; }, 2200); };
  navigator.clipboard?.writeText(url).then(done).catch(()=>{ const ta=document.createElement('textarea'); ta.value=url; ta.style.cssText='position:fixed;opacity:0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); done(); });
}
function shareTwitter(){ const url=`https://publicdrop.in/coin.html?pair=${PAIR}`; window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(`${NAME} (${SYM}) is at ${fmtP(cvPrice)} 📈`)}&url=${encodeURIComponent(url)}`,'_blank'); }
function shareWhatsApp(){ const url=`https://publicdrop.in/coin.html?pair=${PAIR}`; window.open(`https://wa.me/?text=${encodeURIComponent(`Check ${NAME} (${SYM}) on PublicDrop — ${fmtP(cvPrice)}\n${url}`)}`,'_blank'); }
function shareTelegram(){ const url=`https://publicdrop.in/coin.html?pair=${PAIR}`; window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(`${NAME} (${SYM}) — ${fmtP(cvPrice)}`)}`,'_blank'); }
async function shareNative(){ const url=`https://publicdrop.in/coin.html?pair=${PAIR}`; if(navigator.share){ try{ await navigator.share({title:`${NAME} — PublicDrop`,text:`${NAME} is at ${fmtP(cvPrice)}`,url}); }catch(e){} }else{ copyShareLink(); toast('📋 Link copied!'); } }

/* ═══════════════════════════════════════════════════
   VISIBILITY — pause/resume WSS when tab hidden
═══════════════════════════════════════════════════ */
document.addEventListener('visibilitychange', ()=>{
  if(document.hidden){
    // Don't close connections, just stop re-rendering for performance
  } else {
    // Repaint with latest data when tab becomes visible
    const src = OB_STATE.active === 'binance' ? BN_WSS : BG_WSS;
    if(src.book.bids.length) OB_STATE.paintPanel(OB_STATE.active, src.book.bids, src.book.asks);
  }
});

document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeShare(); });
