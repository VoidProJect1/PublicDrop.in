<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Details — PublicDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#F4F1EC;--surface:#FFFFFF;--surface2:#FAF8F5;--surface3:#F0EDE7;--surface4:#E8E4DC;
  --primary:#0D1526;--primary2:#1E2D4A;
  --accent:#F59E0B;--accent2:#F97316;
  --accent-light:#FEF3C7;--accent-light2:#FFF7ED;
  --up:#059669;--up-bg:#ECFDF5;--up-border:rgba(5,150,105,.2);
  --down:#DC2626;--down-bg:#FEF2F2;
  --border:rgba(13,21,38,.06);--border-md:rgba(13,21,38,.1);--border-strong:rgba(13,21,38,.16);
  --muted:#64748B;--light:#94A3B8;
  --sha:0 2px 8px rgba(0,0,0,.06),0 8px 32px rgba(0,0,0,.04);
  --sha-sm:0 1px 3px rgba(0,0,0,.05),0 2px 8px rgba(0,0,0,.03);
  --sha-lg:0 12px 40px rgba(0,0,0,.10),0 4px 12px rgba(0,0,0,.05);
  --r:20px;--rs:14px;--rx:10px;--rpill:999px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--primary);min-height:100vh;-webkit-font-smoothing:antialiased;}

header{background:rgba(255,255,255,.96);backdrop-filter:blur(24px);border-bottom:1.5px solid var(--border-md);position:sticky;top:0;z-index:300;}
.hdr{max-width:1440px;margin:0 auto;padding:0 28px;height:68px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 14px rgba(245,158,11,.4);}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:21px;letter-spacing:-.6px;color:var(--primary);}
.logo-text span{color:var(--accent);}
.back-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--rpill);border:1.5px solid var(--border-strong);background:transparent;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--primary);transition:all .18s;text-decoration:none;}
.back-btn:hover{background:var(--surface3);}
.hdr-right{display:flex;gap:8px;margin-left:auto;}
.btn{padding:8px 18px;border-radius:var(--rpill);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;display:inline-flex;align-items:center;gap:6px;}
.btn-ghost{background:transparent;border:1.5px solid var(--border-strong);color:var(--primary);}
.btn-ghost:hover{background:var(--surface3);}
.btn-prime{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.35);}
.btn-prime:hover{transform:translateY(-1px);}
.btn-nav{background:transparent;color:var(--muted);font-size:13px;font-weight:600;padding:8px 14px;border-radius:var(--rx);border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;transition:all .15s;}
.btn-nav:hover{color:var(--primary);background:var(--surface3);}

main{max-width:1440px;margin:0 auto;padding:32px 28px 80px;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:24px;font-size:13px;color:var(--muted);}
.breadcrumb a{color:var(--muted);text-decoration:none;font-weight:600;transition:color .15s;}
.breadcrumb a:hover{color:var(--accent);}
.breadcrumb span{color:var(--light);}

/* COIN HEADER */
.coin-hero{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-md);box-shadow:var(--sha);padding:32px 36px;margin-bottom:20px;}
.coin-hero-top{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:24px;}
.coin-img{width:68px;height:68px;border-radius:50%;object-fit:cover;flex-shrink:0;background:var(--surface3);}
.coin-img-fb{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;flex-shrink:0;}
.coin-title-wrap{flex:1;}
.coin-name-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px;}
.coin-name{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.8px;}
.coin-sym-badge{font-size:12px;font-weight:700;padding:4px 12px;background:var(--surface3);border-radius:var(--rpill);color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.coin-rank-badge{font-size:12px;font-weight:700;padding:4px 12px;background:var(--accent-light);border-radius:var(--rpill);color:#92400E;}
.coin-price-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.coin-price{font-family:'Syne',sans-serif;font-size:38px;font-weight:800;letter-spacing:-1.5px;line-height:1;}
.cb{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:var(--rpill);font-size:13px;font-weight:700;}
.cu{background:var(--up-bg);color:var(--up);}.cd{background:var(--down-bg);color:var(--down);}
.coin-hero-actions{display:flex;gap:8px;margin-left:auto;align-items:flex-start;flex-wrap:wrap;}
.wl-btn{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .18s;}
.wl-btn:hover{background:var(--accent-light);border-color:var(--accent);}
.wl-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}

/* QUICK STATS */
.quick-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding-top:20px;border-top:1px solid var(--border);}
.qs{text-align:center;padding:14px;}
.qs-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:6px;}
.qs-val{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;letter-spacing:-.3px;}

/* LAYOUT */
.coin-layout{display:grid;grid-template-columns:1fr 340px;gap:20px;align-items:start;}

/* CHART CARD */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-md);box-shadow:var(--sha);overflow:hidden;}
.card-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-ttl{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;}
.card-body{padding:22px;}
.interval-pills{display:flex;gap:4px;background:var(--surface3);padding:4px;border-radius:var(--rpill);}
.ip{padding:6px 14px;border-radius:var(--rpill);font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--muted);font-family:'Plus Jakarta Sans',sans-serif;transition:all .18s;}
.ip:hover{color:var(--primary);}
.ip.active{background:var(--surface);color:var(--primary);box-shadow:0 1px 5px rgba(0,0,0,.1);}
.chart-wrap{height:300px;position:relative;}
.chart-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--surface);z-index:2;border-radius:var(--rs);}
.sp{width:36px;height:36px;border:3px solid var(--border-md);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.chart-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;}
.cs{background:var(--surface2);border-radius:var(--rx);padding:12px 14px;border:1px solid var(--border);}
.cs-l{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:4px;}
.cs-v{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}

/* SIDEBAR */
.coin-stats-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-md);box-shadow:var(--sha);}
.cs-row{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);font-size:13.5px;}
.cs-row:last-child{border-bottom:none;}
.cs-key{color:var(--muted);font-weight:600;}
.cs-val{font-weight:700;text-align:right;}
.progress-bar-wrap{width:100%;height:6px;background:var(--surface3);border-radius:var(--rpill);overflow:hidden;margin-top:3px;}
.progress-fill{height:100%;border-radius:var(--rpill);background:linear-gradient(90deg,var(--up),#34d399);}

/* CONVERTER */
.cv-wrap{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-md);box-shadow:var(--sha);margin-top:16px;}
.cvrow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;padding:18px 18px 0;}
.cvbox{background:var(--surface2);border-radius:var(--rs);border:1px solid var(--border-md);padding:14px 16px;}
.cvbox label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);display:block;margin-bottom:7px;}
.cvir{display:flex;align-items:center;gap:8px;}
.cvinput{flex:1;border:none;background:transparent;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--primary);outline:none;min-width:0;}
.cvtag{display:flex;align-items:center;gap:5px;padding:5px 10px;background:var(--surface);border:1.5px solid var(--border-strong);border-radius:var(--rpill);font-size:12px;font-weight:700;white-space:nowrap;}
.cvtag img{width:18px;height:18px;border-radius:50%;}
.cvswap{width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border-strong);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s;flex-shrink:0;}
.cvswap:hover{background:var(--accent-light);border-color:var(--accent);transform:rotate(180deg);}
.cvcs{width:100%;padding:9px 12px;border:1.5px solid var(--border-md);border-radius:var(--rx);background:var(--surface);font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;font-weight:600;color:var(--primary);outline:none;cursor:pointer;margin-top:6px;}
.cv-result{background:linear-gradient(135deg,var(--primary),var(--primary2));border-radius:0 0 var(--r) var(--r);padding:20px 22px;text-align:center;}
.cvrl{font-size:11px;font-weight:600;opacity:.6;margin-bottom:6px;text-transform:uppercase;letter-spacing:.7px;color:#fff;}
.cvrv{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;letter-spacing:-1px;color:#fff;}
.cvrs{font-size:12px;opacity:.6;margin-top:3px;color:#fff;}

/* DESCRIPTION */
.desc-card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border-md);box-shadow:var(--sha);margin-top:16px;}
.desc-body{padding:18px;font-size:14px;line-height:1.75;color:var(--muted);max-height:160px;overflow:hidden;position:relative;}
.desc-body.expanded{max-height:none;}
.desc-fade{position:absolute;bottom:0;left:0;right:0;height:50px;background:linear-gradient(transparent,var(--surface));pointer-events:none;}
.desc-body.expanded .desc-fade{display:none;}
.desc-toggle{background:none;border:none;color:var(--accent);font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;padding:10px 18px;display:block;}

/* MARKETS TABLE */
.mkt-table-wrap{overflow-x:auto;border:1px solid var(--border-md);border-radius:var(--rs);}
.mktt{width:100%;border-collapse:collapse;min-width:560px;}
.mktt thead th{padding:11px 14px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);background:var(--surface2);border-bottom:1px solid var(--border-md);text-align:left;}
.mktt thead th.r{text-align:right;}
.mktt tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
.mktt tbody tr:hover{background:var(--surface2);}
.mktt tbody tr:last-child{border-bottom:none;}
.mktt td{padding:11px 14px;font-size:13px;vertical-align:middle;}
.mktt td.r{text-align:right;}
.ex-logo{width:22px;height:22px;border-radius:5px;object-fit:cover;background:var(--surface3);margin-right:6px;}
.trust{width:70px;height:5px;background:var(--surface3);border-radius:var(--rpill);overflow:hidden;display:inline-block;}
.trust-fill{height:100%;border-radius:var(--rpill);}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border-md);padding:0 22px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:14px 18px;font-size:13.5px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--muted);border-bottom:2.5px solid transparent;margin-bottom:-1px;transition:all .18s;white-space:nowrap;font-family:'Plus Jakarta Sans',sans-serif;}
.tab-btn:hover{color:var(--primary);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-pane{display:none;padding:22px;}
.tab-pane.active{display:block;}

/* TOAST */
#toast{position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--primary);color:#fff;padding:13px 26px;border-radius:var(--rpill);font-size:13.5px;font-weight:600;box-shadow:0 8px 30px rgba(0,0,0,.25);z-index:9999;transition:transform .38s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:90vw;text-align:center;}
#toast.show{transform:translateX(-50%) translateY(0);}
.loading-full{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:16px;}
.loading-full .sp{width:48px;height:48px;}
.err-full{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;text-align:center;}
.err-full .ico{font-size:56px;}
.err-full p{color:var(--muted);font-size:14px;max-width:400px;line-height:1.65;}

/* RESPONSIVE */
@media(max-width:1100px){.coin-layout{grid-template-columns:1fr;}.quick-stats{grid-template-columns:repeat(2,1fr);}}
@media(max-width:640px){main{padding:16px 16px 60px;}.coin-hero{padding:22px 18px;}.coin-price{font-size:28px;}.chart-stats{grid-template-columns:repeat(2,1fr);}.hdr{padding:0 16px;}.hdr-right{display:none;}.coin-hero-top{gap:14px;}}
@keyframes fu{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fu .4s ease both;}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="index.html">
      <div class="logo-icon">📈</div>
      <div class="logo-text">Public<span>Drop</span></div>
    </a>
    <a class="back-btn" href="index.html">← Back to Markets</a>
    <div class="hdr-right">
      <button class="btn-nav" onclick="location.href='airdrop.html'">🎁 Airdrops</button>
      <button class="btn btn-ghost" onclick="dt('Watchlist')">⭐ Watchlist</button>
      <button class="btn btn-prime" onclick="dt('Trade')">Trade Now</button>
    </div>
  </div>
</header>

<main id="MAIN">
  <div class="loading-full" id="LOADING">
    <div class="sp"></div>
    <div style="font-size:14px;font-weight:600;color:var(--muted)">Loading coin data…</div>
  </div>
</main>

<div id="toast"></div>

<script>
const RATES={USD:1,INR:83.5,EUR:0.92,GBP:0.79,JPY:149.5,AED:3.67,SGD:1.34,CAD:1.36,AUD:1.52};
const RSYM={USD:'$',INR:'₹',EUR:'€',GBP:'£',JPY:'¥',AED:'AED ',SGD:'S$',CAD:'C$',AUD:'A$'};
const RFLG={USD:'🇺🇸',INR:'🇮🇳',EUR:'🇪🇺',GBP:'🇬🇧',JPY:'🇯🇵',AED:'🇦🇪',SGD:'🇸🇬',CAD:'🇨🇦',AUD:'🇦🇺'};
const WL=new Set(JSON.parse(localStorage.getItem('pd_wl')||'[]'));

function dt(f){toast('🚧 "'+f+'" — Website is in Development Phase');}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);}

function fp(n){if(n==null)return'—';if(n>=1000)return'$'+n.toLocaleString('en-US',{maximumFractionDigits:2});if(n>=1)return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});if(n>=0.01)return'$'+n.toFixed(5);return'$'+n.toPrecision(4);}
function fb(n){if(!n)return'—';if(n>=1e12)return'$'+(n/1e12).toFixed(2)+'T';if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';return'$'+n.toLocaleString();}
function fn(n,d=2){return n!=null?n.toLocaleString('en-US',{maximumFractionDigits:d}):'—';}
function fc(n){if(n==null)return'—';const cls=n>=0?'cu':'cd';return`<span class="cb ${cls}">${n>=0?'▲':'▼'} ${Math.abs(n).toFixed(2)}%</span>`;}

/* GET COIN ID FROM URL */
const params=new URLSearchParams(location.search);
const COIN_ID=params.get('id')||'bitcoin';
let coinData=null,chartInst=null,curIntvl='1D';

/* LOAD COIN */
async function loadCoin(){
  try{
    const [info,mkt]=await Promise.all([
      fetch(`https://api.coingecko.com/api/v3/coins/${COIN_ID}?localization=false&tickers=true&market_data=true&community_data=true&developer_data=false&sparkline=false`).then(r=>r.json()),
      fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${COIN_ID}&sparkline=false&price_change_percentage=1h,24h,7d,30d`).then(r=>r.json())
    ]);
    coinData=info;
    const md=info.market_data;
    const price=md.current_price.usd;
    const chg24=md.price_change_percentage_24h;
    const chg7=md.price_change_percentage_7d;
    const chg30=md.price_change_percentage_30d;
    const up24=chg24>=0;
    const inWL=WL.has(info.id);
    document.title=`${info.name} (${info.symbol.toUpperCase()}) — PublicDrop`;

    document.getElementById('MAIN').innerHTML=`
    <div class="breadcrumb anim">
      <a href="index.html">Markets</a>
      <span>›</span>
      <span>${info.name}</span>
    </div>

    <!-- HERO -->
    <div class="coin-hero anim">
      <div class="coin-hero-top">
        <img class="coin-img" src="${info.image?.large}" alt="${info.name}" onerror="this.outerHTML='<div class=coin-img-fb>${info.symbol?.[0]?.toUpperCase()||'?'}</div>'">
        <div class="coin-title-wrap">
          <div class="coin-name-row">
            <div class="coin-name">${info.name}</div>
            <div class="coin-sym-badge">${info.symbol?.toUpperCase()}</div>
            <div class="coin-rank-badge">#${info.market_cap_rank||'?'}</div>
          </div>
          <div class="coin-price-row">
            <div class="coin-price">${fp(price)}</div>
            ${fc(chg24)}
            <span style="font-size:13px;color:var(--muted);font-weight:600">24h</span>
          </div>
        </div>
        <div class="coin-hero-actions">
          <button class="wl-btn ${inWL?'active':''}" id="WL_BTN" onclick="toggleWL('${info.id}','${info.name}')">${inWL?'★':'☆'}</button>
          <button class="btn btn-ghost" onclick="dt('Share')">Share</button>
          <button class="btn btn-prime" onclick="dt('Buy ${info.name}')">Buy ${info.symbol?.toUpperCase()}</button>
        </div>
      </div>

      <div class="quick-stats">
        <div class="qs"><div class="qs-label">Market Cap</div><div class="qs-val">${fb(md.market_cap?.usd)}</div></div>
        <div class="qs"><div class="qs-label">24h Volume</div><div class="qs-val">${fb(md.total_volume?.usd)}</div></div>
        <div class="qs"><div class="qs-label">Circ. Supply</div><div class="qs-val">${md.circulating_supply?fn(md.circulating_supply,0)+' '+info.symbol.toUpperCase():'—'}</div></div>
        <div class="qs"><div class="qs-label">Total Supply</div><div class="qs-val">${md.total_supply?fn(md.total_supply,0):md.max_supply?fn(md.max_supply,0):'∞'}</div></div>
      </div>
    </div>

    <!-- LAYOUT -->
    <div class="coin-layout">
      <!-- LEFT -->
      <div>
        <!-- CHART CARD -->
        <div class="card anim" style="animation-delay:.05s">
          <div class="card-hdr">
            <div class="card-ttl">📈 Price Chart</div>
            <div class="interval-pills" id="IVALS">
              <button class="ip" onclick="loadChart('15M',this)">15M</button>
              <button class="ip" onclick="loadChart('1H',this)">1H</button>
              <button class="ip" onclick="loadChart('4H',this)">4H</button>
              <button class="ip active" onclick="loadChart('1D',this)">1D</button>
              <button class="ip" onclick="loadChart('1W',this)">1W</button>
              <button class="ip" onclick="loadChart('1M',this)">1M</button>
              <button class="ip" onclick="loadChart('1Y',this)">1Y</button>
            </div>
          </div>
          <div class="card-body">
            <div class="chart-wrap">
              <div class="chart-loading" id="CL"><div class="sp"></div></div>
              <canvas id="PCHART"></canvas>
            </div>
            <div class="chart-stats" id="CSTATS"></div>
          </div>
        </div>

        <!-- MARKET TABS -->

          <div class="cs-row"><div class="cs-key">Market Cap</div><div class="cs-val">${fb(md.market_cap?.usd)}</div></div>

          <div class="cs-row"><div class="cs-key">Circulating Supply</div><div class="cs-val" style="font-size:12px">${md.circulating_supply?fn(md.circulating_supply,0)+' '+info.symbol.toUpperCase():'—'}</div></div>
          <div class="cs-row"><div class="cs-key">Max Supply</div><div class="cs-val" style="font-size:12px">${md.max_supply?fn(md.max_supply,0)+' '+info.symbol.toUpperCase():'∞'}</div></div>
          <div class="cs-row"><div class="cs-key">All Time High</div><div class="cs-val" style="color:var(--up)">${fp(md.ath?.usd)}</div></div>

          <div class="cs-row"><div class="cs-key">From ATL</div><div class="cs-val" style="color:var(--up)">${md.atl_change_percentage?.usd!=null?'+'+md.atl_change_percentage.usd.toFixed(0)+'%':'—'}</div></div>

function renderMarketsTab(info){
  const tickers=(info.tickers||[]).slice(0,25);
  if(!tickers.length)return`<div style="text-align:center;padding:40px;color:var(--muted)">No exchange data available.</div>`;
  return`<div style="margin-bottom:12px;font-size:13px;color:var(--muted)">Showing ${tickers.length} exchange listings for <strong>${info.symbol?.toUpperCase()}</strong></div>
  <div class="mkt-table-wrap"><table class="mktt">
    <thead><tr><th>#</th><th>Exchange / Pair</th><th class="r">Price</th><th class="r">Volume (24h)</th><th class="r">Trust</th><th class="r">Spread</th></tr></thead>
    <tbody>${tickers.map((t,i)=>{
      const trust=t.trust_score==='green'?90:t.trust_score==='yellow'?55:25;
      const tc=t.trust_score==='green'?'var(--up)':t.trust_score==='yellow'?'var(--accent)':'var(--down)';
      return`<tr><td>${i+1}</td><td><div style="display:flex;align-items:center"><img class="ex-logo" src="https://assets.coingecko.com/markets/images/${t.market?.identifier||'x'}/small/logo.png" onerror="this.style.display='none'"><div><div style="font-weight:700;font-size:13px">${t.market?.name||'Unknown'}</div><div style="font-size:11px;color:var(--muted)">${t.base}/${t.target}</div></div></div></td><td class="r" style="font-weight:700">${fp(t.converted_last?.usd)}</td><td class="r" style="color:var(--muted)">${t.converted_volume?.usd?fb(t.converted_volume.usd):'—'}</td><td class="r"><div style="display:flex;align-items:center;justify-content:flex-end;gap:6px"><div class="trust"><div class="trust-fill" style="width:${trust}%;background:${tc}"></div></div><span style="font-size:11px;font-weight:700;color:${tc}">${t.trust_score||'?'}</span></div></td><td class="r" style="color:var(--muted);font-size:12px">${t.bid_ask_spread_percentage?t.bid_ask_spread_percentage.toFixed(3)+'%':'—'}</td></tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

function renderConvertTab(info){
  const price=info.market_data?.current_price?.usd||0;
  const sym=info.symbol?.toUpperCase()||'';
  const qCurs=['USD','INR','EUR','GBP','JPY','AED'];
  return`<div style="max-width:500px;margin:0 auto">
    <div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:18px;text-align:center">Quick Conversion Rates</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      ${qCurs.map(cur=>{
        const r=RATES[cur]||1,v=price*r,s=RSYM[cur]||'$',f=RFLG[cur]||'🌐';
        const d=cur==='JPY'?fn(v,0):fn(v,2);
        return`<div style="background:var(--surface2);border-radius:var(--rx);border:1px solid var(--border);padding:14px;text-align:center"><div style="font-size:20px;margin-bottom:4px">${f}</div><div style="font-size:10.5px;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:3px">${cur}</div><div style="font-family:'Syne',sans-serif;font-size:15px;font-weight:700">${s}${d}</div></div>`;
      }).join('')}
    </div>
    <div style="margin-top:12px;text-align:center;font-size:12px;color:var(--muted)">1 ${sym} · Rates are approximate</div>
  </div>`;
}

/* CHART */
async function loadChart(interval,btn){
  curIntvl=interval;
  document.querySelectorAll('.ip').forEach(b=>b?.classList.remove('active'));
  btn?.classList.add('active');
  const cl=document.getElementById('CL');
  if(cl)cl.style.display='flex';
  const days={
    '15M':'1','1H':'1','4H':'7','1D':'30','1W':'90','1M':'180','1Y':'365'
  }[interval]||'30';
  try{
    const r=await fetch(`https://api.coingecko.com/api/v3/coins/${COIN_ID}/market_chart?vs_currency=usd&days=${days}&precision=6`);
    const data=await r.json();
    const prices=data.prices||[];
    const labels=prices.map(p=>{
      const d=new Date(p[0]);
      if(days==='1')return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    });
    const vals=prices.map(p=>p[1]);
    const up=vals[vals.length-1]>=vals[0];
    const color=up?'#059669':'#DC2626';
    const bgColor=up?'rgba(5,150,105,0.08)':'rgba(220,38,38,0.06)';
    if(chartInst){chartInst.destroy();chartInst=null;}
    const ctx=document.getElementById('PCHART');
    if(!ctx)return;
    chartInst=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{data:vals,borderColor:color,backgroundColor:bgColor,fill:true,borderWidth:2,pointRadius:0,pointHoverRadius:4,tension:.3}]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{backgroundColor:'rgba(13,21,38,.92)',titleColor:'rgba(255,255,255,.6)',bodyColor:'#fff',bodyFont:{family:'Plus Jakarta Sans',weight:'700',size:13},padding:10,cornerRadius:8,callbacks:{label:ctx=>'$'+ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:6})}}},
        scales:{x:{grid:{display:false},ticks:{color:'#94A3B8',font:{size:11},maxTicksLimit:8,maxRotation:0}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#94A3B8',font:{size:11},callback:v=>'$'+v.toLocaleString('en-US',{maximumFractionDigits:2})}}}}
    });
    const mn=Math.min(...vals),mx=Math.max(...vals),chg=((vals[vals.length-1]-vals[0])/vals[0]*100);
    const cs=document.getElementById('CSTATS');
    if(cs)cs.innerHTML=`
      <div class="cs"><div class="cs-l">Period High</div><div class="cs-v">${fp(mx)}</div></div>
      <div class="cs"><div class="cs-l">Period Low</div><div class="cs-v">${fp(mn)}</div></div>
      <div class="cs"><div class="cs-l">Change</div><div class="cs-v" style="color:${chg>=0?'var(--up)':'var(--down)'}">${chg>=0?'+':''}${chg.toFixed(2)}%</div></div>
      <div class="cs"><div class="cs-l">Data Points</div><div class="cs-v">${vals.length}</div></div>`;
  }catch(e){
    const cs=document.getElementById('CSTATS');
    if(cs)cs.innerHTML=`<div style="color:var(--muted);font-size:13px;grid-column:1/-1">Chart data unavailable. Try again.</div>`;
  }
  if(cl)cl.style.display='none';
}

/* TAB SWITCH */
function swTab(name,el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const tp=document.getElementById('tp-'+name);
  if(tp)tp.classList.add('active');
  el.classList.add('active');
}

/* CONVERTER */
function calcConv(price,sym){
  const amt=parseFloat(document.getElementById('CV_AMT')?.value)||1;
  const cur=document.getElementById('CV_CUR')?.value||'INR';
  const r=RATES[cur]||1,v=amt*price*r,s=RSYM[cur]||'$';
  const names={USD:'US Dollar',INR:'Indian Rupee',EUR:'Euro',GBP:'British Pound',JPY:'Japanese Yen',AED:'UAE Dirham',SGD:'Singapore Dollar',CAD:'Canadian Dollar',AUD:'Australian Dollar'};
  const d=cur==='JPY'?s+fn(v,0):s+fn(v,2);
  if(document.getElementById('CV_RES'))document.getElementById('CV_RES').textContent=d;
  if(document.getElementById('CV_SUB'))document.getElementById('CV_SUB').textContent=`${names[cur]||cur} · ${amt} ${sym} = ${d}`;
}
function swapConv(price,sym){
  const amt=parseFloat(document.getElementById('CV_AMT')?.value)||1;
  const cur=document.getElementById('CV_CUR')?.value||'INR';
  const r=RATES[cur]||1,coinAmt=1/price;
  document.getElementById('CV_AMT').value=(amt*price*r*coinAmt).toPrecision(6);
  calcConv(price,sym);
}

/* WATCHLIST */
function toggleWL(id,name){
  const btn=document.getElementById('WL_BTN');
  if(WL.has(id)){WL.delete(id);if(btn){btn.textContent='☆';btn.classList.remove('active');}toast('Removed from watchlist');}
  else{WL.add(id);if(btn){btn.textContent='★';btn.classList.add('active');}toast('⭐ Added to watchlist!');}
  localStorage.setItem('pd_wl',JSON.stringify([...WL]));
}

/* DESC TOGGLE */
function toggleDesc(){
  const d=document.getElementById('DESC');
  const btn=event.target;
  if(d.classList.contains('expanded')){d.classList.remove('expanded');btn.textContent='Read more ↓';}
  else{d.classList.add('expanded');btn.textContent='Show less ↑';}
}
