<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Details — PublicDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  --bg:#08090D;--s1:#0F1117;--s2:#161820;--s3:#1D1F2A;--s4:#252837;
  --border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--border3:rgba(255,255,255,.16);
  --t1:#FFFFFF;--t2:#9899A6;--t3:#5C5D6E;--t4:#3A3B4A;
  --up:#00C896;--up-dim:rgba(0,200,150,.1);--up-border:rgba(0,200,150,.25);
  --dn:#FF4560;--dn-dim:rgba(255,69,96,.1);--dn-border:rgba(255,69,96,.25);
  --mono:'JetBrains Mono',monospace;
  --r:16px;--rs:12px;--rx:8px;--rpill:999px;
  --sha:0 4px 24px rgba(0,0,0,.5);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* HEADER */
header{background:rgba(8,9,13,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:300;}
.hdr{max-width:1600px;margin:0 auto;padding:0 32px;height:64px;display:flex;align-items:center;gap:16px;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.logo-mk{width:34px;height:34px;background:#fff;border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-mk svg{width:20px;height:20px;}
.logo-tx{font-family:'Syne',sans-serif;font-weight:800;font-size:19px;letter-spacing:-.5px;color:var(--t1);}
.logo-tx em{font-style:normal;color:var(--t3);}
.back-link{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--rpill);border:1px solid var(--border2);color:var(--t2);font-size:13px;font-weight:600;text-decoration:none;transition:all .15s;flex-shrink:0;}
.back-link:hover{border-color:var(--border3);color:var(--t1);background:var(--s3);}
.hdr-right{display:flex;gap:8px;margin-left:auto;align-items:center;}
.nav-btn{padding:7px 14px;border-radius:var(--rx);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--t2);transition:all .15s;}
.nav-btn:hover{color:var(--t1);background:var(--s3);}
.btn-solid{padding:7px 18px;border-radius:var(--rpill);background:var(--t1);color:var(--bg);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;border:none;transition:opacity .18s;}
.btn-solid:hover{opacity:.88;}
.btn-outline{padding:7px 16px;border-radius:var(--rpill);background:transparent;border:1px solid var(--border3);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;}
.btn-outline:hover{background:var(--s3);}

main{max-width:1600px;margin:0 auto;padding:28px 32px 80px;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:22px;font-size:12.5px;color:var(--t3);}
.breadcrumb a{color:var(--t3);text-decoration:none;font-weight:600;transition:color .15s;}
.breadcrumb a:hover{color:var(--t1);}

/* HERO CARD */
.coin-hero{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:30px 34px;margin-bottom:20px;position:relative;overflow:hidden;}
.coin-hero::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);}
.coin-hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;flex-wrap:wrap;margin-bottom:26px;}
.coin-left{display:flex;align-items:flex-start;gap:18px;}
.coin-img-lg{width:64px;height:64px;border-radius:50%;object-fit:cover;background:var(--s3);flex-shrink:0;}
.coin-img-fb{width:64px;height:64px;border-radius:50%;background:var(--s3);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--t2);flex-shrink:0;}
.coin-badges{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rpill);}
.badge-sym{background:var(--s3);color:var(--t2);border:1px solid var(--border2);font-family:var(--mono);letter-spacing:.3px;}
.badge-rank{background:var(--s4);color:var(--t3);border:1px solid var(--border);}
.coin-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px;}
.coin-price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.coin-price{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;letter-spacing:-1.5px;}
.chg-pill{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:var(--rpill);font-size:13px;font-weight:700;font-family:var(--mono);}
.chg-up{background:var(--up-dim);color:var(--up);border:1px solid var(--up-border);}
.chg-dn{background:var(--dn-dim);color:var(--dn);border:1px solid var(--dn-border);}
.coin-actions{display:flex;gap:8px;align-items:flex-start;flex-shrink:0;}
.wl-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--t3);transition:all .15s;}
.wl-btn:hover{border-color:var(--border3);color:#FFD700;}
.wl-btn.on{color:#FFD700;border-color:rgba(255,215,0,.3);background:rgba(255,215,0,.06);}

/* QUICK STATS ROW */
.quick-stats{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border-top:1px solid var(--border);}
.qs{padding:18px 20px;border-right:1px solid var(--border);}
.qs:last-child{border-right:none;}
.qs-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:6px;}
.qs-val{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--t1);}
.qs-sub{font-size:10.5px;color:var(--t4);margin-top:2px;font-family:var(--mono);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:1fr 320px;gap:16px;align-items:start;}

/* CARD */
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;position:relative;}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);pointer-events:none;}
.card-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.card-body{padding:20px 22px;}

/* INTERVAL PILLS */
.int-pills{display:flex;gap:3px;background:var(--s2);padding:3px;border-radius:var(--rpill);}
.ip{padding:5px 13px;border-radius:var(--rpill);font-size:12px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t3);font-family:'DM Sans',sans-serif;transition:all .15s;}
.ip:hover{color:var(--t1);}
.ip.active{background:var(--s4);color:var(--t1);}

/* CHART */
.chart-wrap{height:300px;position:relative;}
.chart-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:var(--s1);z-index:2;border-radius:var(--rs);}
.spin{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--t1);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.chart-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:14px;}
.cs-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--rx);padding:12px 14px;}
.cs-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);margin-bottom:4px;}
.cs-val{font-family:var(--mono);font-size:14px;font-weight:600;}

/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);padding:0 22px;overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab-btn{padding:13px 18px;font-size:13px;font-weight:600;cursor:pointer;border:none;background:none;color:var(--t3);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:nowrap;font-family:'DM Sans',sans-serif;}
.tab-btn:hover{color:var(--t1);}
.tab-btn.active{color:var(--t1);border-bottom-color:var(--t1);}
.tab-pane{display:none;padding:20px 22px;}
.tab-pane.active{display:block;}

/* SIDEBAR STATS */
.side-stat{border-bottom:1px solid var(--border);}
.side-stat:last-child{border-bottom:none;}
.ss-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;}
.ss-key{font-size:12.5px;color:var(--t3);font-weight:500;}
.ss-val{font-family:var(--mono);font-size:13px;font-weight:600;text-align:right;color:var(--t1);}

/* ORDER BOOK */
.ob-row{display:grid;grid-template-columns:1fr 1fr 80px;gap:0;font-family:var(--mono);font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);}
.ob-row:last-child{border-bottom:none;}
.ob-head{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:700;padding:8px 0 6px;}
.ob-price-up{color:var(--up);}
.ob-price-dn{color:var(--dn);}
.ob-bar-bg{background:var(--s3);border-radius:2px;height:3px;margin-top:3px;overflow:hidden;}
.ob-bar-fill-up{height:100%;border-radius:2px;background:var(--up);opacity:.5;}
.ob-bar-fill-dn{height:100%;border-radius:2px;background:var(--dn);opacity:.5;}

/* CONVERTER */
.cv-box{background:var(--s2);border:1px solid var(--border);border-radius:var(--rs);padding:14px 16px;margin-bottom:12px;}
.cv-label{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);font-weight:700;margin-bottom:7px;}
.cv-row{display:flex;align-items:center;gap:8px;}
.cv-input{flex:1;background:transparent;border:none;outline:none;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--t1);min-width:0;}
.cv-tag{display:flex;align-items:center;gap:5px;padding:5px 11px;background:var(--s4);border-radius:var(--rpill);font-size:12px;font-weight:700;font-family:var(--mono);color:var(--t2);flex-shrink:0;}
.cv-tag img{width:16px;height:16px;border-radius:50%;}
.cv-swap{width:36px;height:36px;border-radius:50%;border:1px solid var(--border2);background:var(--s3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);transition:all .2s;margin:6px auto;}
.cv-swap:hover{background:var(--s4);color:var(--t1);transform:rotate(180deg);}
.cv-select{width:100%;padding:9px 12px;background:var(--s3);border:1px solid var(--border2);border-radius:var(--rx);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;outline:none;margin-top:6px;}
.cv-result{background:var(--s4);border:1px solid var(--border2);border-radius:var(--rs);padding:18px;text-align:center;}
.cv-res-label{font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;}
.cv-res-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.8px;}
.cv-res-sub{font-size:11px;color:var(--t3);margin-top:3px;font-family:var(--mono);}

/* TOAST */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--s2);border:1px solid var(--border2);color:var(--t1);padding:12px 24px;border-radius:var(--rpill);font-size:13px;font-weight:600;box-shadow:var(--sha);z-index:9999;transition:transform .36s cubic-bezier(.34,1.56,.64,1);pointer-events:none;max-width:90vw;}
#toast.show{transform:translateX(-50%) translateY(0);}

.loading-full{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:14px;}
.loading-full .spin{width:44px;height:44px;border-width:3px;}
.err-full{display:flex;align-items:center;justify-content:center;min-height:60vh;flex-direction:column;gap:12px;text-align:center;padding:32px;}
.err-full .ico{font-size:56px;margin-bottom:6px;}
.err-full p{color:var(--t2);font-size:14px;line-height:1.7;max-width:400px;}

/* PROGRESS */
.range-bar{margin:14px 0 6px;}
.rb-labels{display:flex;justify-content:space-between;font-size:11px;font-family:var(--mono);color:var(--t3);margin-bottom:5px;}
.rb-track{height:5px;background:var(--s4);border-radius:3px;overflow:hidden;position:relative;}
.rb-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--dn),var(--up));}
.rb-thumb{position:absolute;top:50%;transform:translateY(-50%);width:10px;height:10px;background:var(--t1);border-radius:50%;border:2px solid var(--bg);}

@media(max-width:1100px){.layout{grid-template-columns:1fr;}.quick-stats{grid-template-columns:repeat(3,1fr);}}
@media(max-width:640px){main{padding:16px 16px 60px;}.hdr{padding:0 16px;}.hdr-right{display:none;}.coin-hero{padding:20px 18px;}.coin-price{font-size:26px;}.quick-stats{grid-template-columns:repeat(2,1fr);}.chart-stats{grid-template-columns:repeat(2,1fr);}}
@keyframes fu{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.anim{animation:fu .35s ease both;}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="index.html">
      <div class="logo-mk">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 12l4-4 4 4 4-4 4 4" stroke="#0B0B0F" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div class="logo-tx">Public<em>Drop</em></div>
    </a>
    <a class="back-link" href="index.html">← Markets</a>
    <div class="hdr-right">
      <button class="nav-btn" onclick="location.href='airdrop.html'">Airdrops</button>
      <button class="btn-outline" onclick="dt('Watchlist')">⭐ Watchlist</button>
      <button class="btn-solid" onclick="dt('Trade')">Trade</button>
    </div>
  </div>
</header>

<main id="MAIN">
  <div class="loading-full"><div class="spin"></div><div style="font-size:13px;color:var(--t3)">Loading market data…</div></div>
</main>

<div id="toast"></div>

<script>
const RATES={USD:1,INR:83.5,EUR:.92,GBP:.79,JPY:149.5,AED:3.67,SGD:1.34,CAD:1.36,AUD:1.52};
const RSYM={USD:'$',INR:'₹',EUR:'€',GBP:'£',JPY:'¥',AED:'AED ',SGD:'S$',CAD:'C$',AUD:'A$'};
const RNAME={USD:'US Dollar',INR:'Indian Rupee',EUR:'Euro',GBP:'British Pound',JPY:'Japanese Yen',AED:'UAE Dirham',SGD:'Singapore Dollar',CAD:'Canadian Dollar',AUD:'Australian Dollar'};
const WL=new Set(JSON.parse(localStorage.getItem('pd_wl')||'[]'));

const COIN_META={
  BTC:{name:'Bitcoin',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/btc.png'},
  ETH:{name:'Ethereum',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/eth.png'},
  BNB:{name:'BNB',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/bnb.png'},
  SOL:{name:'Solana',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/sol.png'},
  XRP:{name:'XRP',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/xrp.png'},
  ADA:{name:'Cardano',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/ada.png'},
  DOGE:{name:'Dogecoin',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/doge.png'},
  MATIC:{name:'Polygon',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/matic.png'},
  DOT:{name:'Polkadot',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/dot.png'},
  LTC:{name:'Litecoin',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/ltc.png'},
  AVAX:{name:'Avalanche',img:'https://assets.coingecko.com/coins/images/12559/small/Avalanche_Circle_RedWhite_Trans.png'},
  LINK:{name:'Chainlink',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/link.png'},
  UNI:{name:'Uniswap',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/uni.png'},
  SHIB:{name:'Shiba Inu',img:'https://assets.coingecko.com/coins/images/11939/small/shiba.png'},
  NEAR:{name:'NEAR Protocol',img:'https://assets.coingecko.com/coins/images/10365/small/near.jpg'},
  OP:{name:'Optimism',img:'https://assets.coingecko.com/coins/images/25244/small/Optimism.png'},
  ARB:{name:'Arbitrum',img:'https://assets.coingecko.com/coins/images/16547/small/photo_2023-03-29_21.47.00.jpeg'},
  SUI:{name:'Sui',img:'https://assets.coingecko.com/coins/images/26375/small/sui_asset.jpeg'},
  APT:{name:'Aptos',img:'https://assets.coingecko.com/coins/images/26455/small/aptos_round.png'},
  INJ:{name:'Injective',img:'https://assets.coingecko.com/coins/images/12882/small/Secondary_Symbol.png'},
  PEPE:{name:'Pepe',img:'https://assets.coingecko.com/coins/images/29850/small/pepe-token.jpeg'},
  WIF:{name:'dogwifhat',img:'https://assets.coingecko.com/coins/images/33566/small/dogwifhat.jpg'},
  ATOM:{name:'Cosmos',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/atom.png'},
  TRX:{name:'TRON',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/trx.png'},
  AAVE:{name:'Aave',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/aave.png'},
  RNDR:{name:'Render',img:'https://assets.coingecko.com/coins/images/11636/small/rndr.png'},
  FET:{name:'Fetch.ai',img:'https://assets.coingecko.com/coins/images/5681/small/Fetch.jpg'},
  BCH:{name:'Bitcoin Cash',img:'https://cdn.jsdelivr.net/gh/spothq/cryptocurrency-icons/128/color/bch.png'},
  ICP:{name:'Internet Computer',img:'https://assets.coingecko.com/coins/images/14495/small/Internet_Computer_logo.png'},
};
function getMeta(sym){return COIN_META[sym]||{name:sym,img:''};}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),3200);}
function dt(f){toast('🚧 "'+f+'" — Website is in Development Phase');}

function fmtPrice(n){
  if(n==null||isNaN(n))return'—';n=parseFloat(n);
  if(n>=10000)return'$'+n.toLocaleString('en-US',{maximumFractionDigits:2});
  if(n>=1)return'$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4});
  if(n>=0.01)return'$'+n.toFixed(5);
  return'$'+n.toPrecision(4);
}
function fmtVol(n){
  n=parseFloat(n);if(!n||isNaN(n))return'—';
  if(n>=1e9)return'$'+(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return'$'+(n/1e3).toFixed(1)+'K';
  return'$'+n.toFixed(2);
}
function fn(n,d=2){return n!=null&&!isNaN(n)?parseFloat(n).toLocaleString('en-US',{maximumFractionDigits:d}):'—';}

const params=new URLSearchParams(location.search);
const PAIR=params.get('pair')||'BTCUSDT';
const SYM=PAIR.replace('USDT','');
const meta=getMeta(SYM);
let chartInst=null,cvPrice=0;

async function loadCoin(){
  try{
    const [tickerRes,bookRes]=await Promise.all([
      fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${PAIR}`),
      fetch(`https://api.binance.com/api/v3/depth?symbol=${PAIR}&limit=10`)
    ]);
    const ticker=await tickerRes.json();
    const book=await bookRes.json();
    if(ticker.code){throw new Error(ticker.msg||'Invalid symbol');}
    cvPrice=parseFloat(ticker.lastPrice);
    render(ticker,book);
    loadChart('1D',null);
  }catch(e){
    document.getElementById('MAIN').innerHTML=`<div class="err-full"><div class="ico">⚠️</div><p><strong>${PAIR}</strong> — Could not load market data.<br>${e.message||'Check your connection.'}</p><a href="index.html" class="btn-solid" style="text-decoration:none;padding:10px 22px;border-radius:var(--rpill);background:#fff;color:#08090D;font-weight:700;font-size:13px;margin-top:8px">← Back to Markets</a></div>`;
  }
}

function render(t,book){
  const price=parseFloat(t.lastPrice);
  const chg=parseFloat(t.priceChangePercent);
  const up=chg>=0;
  const high=parseFloat(t.highPrice),low=parseFloat(t.lowPrice);
  const pricePct=high>low?((price-low)/(high-low)*100).toFixed(1):50;
  const inWL=WL.has(PAIR);
  const imgTag=meta.img
    ?`<img class="coin-img-lg" src="${meta.img}" alt="${SYM}" onerror="this.outerHTML='<div class=coin-img-fb>${SYM[0]}</div>'">`
    :`<div class="coin-img-fb">${SYM[0]}</div>`;
  document.title=`${meta.name||SYM} (${SYM}/USDT) — PublicDrop`;

  document.getElementById('MAIN').innerHTML=`
  <div class="breadcrumb anim"><a href="index.html">Markets</a> <span style="color:var(--t4)">›</span> <span>${meta.name||SYM}</span> <span style="color:var(--t4)">›</span> <span>${SYM}/USDT</span></div>

  <div class="coin-hero anim">
    <div class="coin-hero-row">
      <div class="coin-left">
        ${imgTag}
        <div>
          <div class="coin-badges">
            <span class="badge badge-sym">${SYM}/USDT</span>
            <span class="badge badge-rank">Binance</span>
          </div>
          <div class="coin-title">${meta.name||SYM}</div>
          <div class="coin-price-row">
            <div class="coin-price">${fmtPrice(price)}</div>
            <span class="chg-pill ${up?'chg-up':'chg-dn'}">${up?'▲':'▼'} ${Math.abs(chg).toFixed(2)}%</span>
            <span style="font-size:13px;color:var(--t3);font-family:var(--mono)">${fmtPrice(Math.abs(parseFloat(t.priceChange)))} (24h)</span>
          </div>
        </div>
      </div>
      <div class="coin-actions">
        <button class="wl-btn ${inWL?'on':''}" id="WL_BTN" onclick="toggleWL()">${inWL?'★':'☆'}</button>
        <button class="btn-outline" onclick="dt('Share')">Share</button>
        <button class="btn-solid" onclick="dt('Trade ${SYM}')">Trade ${SYM}</button>
      </div>
    </div>
    <div class="range-bar">
      <div class="rb-labels"><span>${fmtPrice(low)} 24h Low</span><span>24h High ${fmtPrice(high)}</span></div>
      <div class="rb-track"><div class="rb-fill" style="width:100%"></div><div class="rb-thumb" style="left:calc(${pricePct}% - 5px)"></div></div>
    </div>
    <div class="quick-stats">
      <div class="qs"><div class="qs-label">24h Volume</div><div class="qs-val">${fmtVol(parseFloat(t.quoteVolume))}</div><div class="qs-sub">${fmtVol(parseFloat(t.volume))} ${SYM}</div></div>
      <div class="qs"><div class="qs-label">24h Trades</div><div class="qs-val">${parseInt(t.count).toLocaleString()}</div><div class="qs-sub">Completed orders</div></div>
      <div class="qs"><div class="qs-label">Bid Price</div><div class="qs-val" style="color:var(--up)">${fmtPrice(t.bidPrice)}</div><div class="qs-sub">Best buy</div></div>
      <div class="qs"><div class="qs-label">Ask Price</div><div class="qs-val" style="color:var(--dn)">${fmtPrice(t.askPrice)}</div><div class="qs-sub">Best sell</div></div>
      <div class="qs"><div class="qs-label">Spread</div><div class="qs-val" style="font-family:var(--mono)">${((parseFloat(t.askPrice)-parseFloat(t.bidPrice))/parseFloat(t.askPrice)*100).toFixed(4)}%</div><div class="qs-sub">Bid-Ask</div></div>
    </div>
  </div>

  <div class="layout">
    <div>
      <!-- CHART -->
      <div class="card anim" style="margin-bottom:16px">
        <div class="card-hdr">
          <div class="card-title">Price Chart</div>
          <div class="int-pills" id="INT_PILLS">
            <button class="ip" onclick="loadChart('15m',this)">15m</button>
            <button class="ip" onclick="loadChart('1h',this)">1H</button>
            <button class="ip" onclick="loadChart('4h',this)">4H</button>
            <button class="ip active" onclick="loadChart('1d',this)">1D</button>
            <button class="ip" onclick="loadChart('1w',this)">1W</button>
            <button class="ip" onclick="loadChart('1M',this)">1M</button>
          </div>
        </div>
        <div class="card-body">
          <div class="chart-wrap">
            <div class="chart-overlay" id="CHART_LOADER"><div class="spin"></div></div>
            <canvas id="PRICE_CHART"></canvas>
          </div>
          <div class="chart-stats" id="CHART_STATS"></div>
        </div>
      </div>

      <!-- TABS -->
      <div class="card anim">
        <div class="tabs">
          <button class="tab-btn active" onclick="swTab('converter',this)">💱 Converter</button>
          <button class="tab-btn" onclick="swTab('orderbook',this)">📖 Order Book</button>
          <button class="tab-btn" onclick="swTab('stats',this)">📊 Statistics</button>
        </div>
        <!-- CONVERTER -->
        <div class="tab-pane active" id="tp-converter">
          <div style="max-width:480px;margin:0 auto">
            <div class="cv-box">
              <div class="cv-label">${SYM} Amount</div>
              <div class="cv-row">
                <input class="cv-input" type="number" id="CV_AMT" value="1" min="0" step="any" oninput="calcConv()">
                <div class="cv-tag">${meta.img?`<img src="${meta.img}" onerror="this.style.display='none'">`:''}${SYM}</div>
              </div>
            </div>
            <div class="cv-swap" onclick="swapConv()">⇄</div>
            <div class="cv-box">
              <div class="cv-label">Target Currency</div>
              <select class="cv-select" id="CV_CUR" onchange="calcConv()">
                <option value="USD">🇺🇸 US Dollar (USD)</option>
                <option value="INR" selected>🇮🇳 Indian Rupee (INR)</option>
                <option value="EUR">🇪🇺 Euro (EUR)</option>
                <option value="GBP">🇬🇧 British Pound (GBP)</option>
                <option value="JPY">🇯🇵 Japanese Yen (JPY)</option>
                <option value="AED">🇦🇪 UAE Dirham (AED)</option>
                <option value="SGD">🇸🇬 Singapore Dollar (SGD)</option>
                <option value="CAD">🇨🇦 Canadian Dollar (CAD)</option>
                <option value="AUD">🇦🇺 Australian Dollar (AUD)</option>
              </select>
            </div>
            <div class="cv-result" id="CV_RESULT">
              <div class="cv-res-label">1 ${SYM} equals</div>
              <div class="cv-res-val" id="CV_RES_VAL">—</div>
              <div class="cv-res-sub" id="CV_RES_SUB">Calculating…</div>
            </div>
            <div style="margin-top:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
              ${['USD','INR','EUR','GBP','JPY','AED'].map(cur=>{
                const r=RATES[cur]||1,v=cvPrice*r,s=RSYM[cur]||'$';
                const d=cur==='JPY'?s+fn(v,0):s+fn(v,2);
                return`<div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--rx);padding:10px 12px;text-align:center"><div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:3px">${cur}</div><div style="font-family:var(--mono);font-size:13px;font-weight:600">${d}</div></div>`;
              }).join('')}
            </div>
          </div>
        </div>
        <!-- ORDER BOOK -->
        <div class="tab-pane" id="tp-orderbook">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--up);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">Bids (Buy Orders)</div>
              <div id="OB_BIDS">${renderBookRows(book.bids,'up')}</div>
            </div>
            <div>
              <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--dn);margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border)">Asks (Sell Orders)</div>
              <div id="OB_ASKS">${renderBookRows(book.asks,'dn')}</div>
            </div>
          </div>
          <div style="margin-top:14px;text-align:center;font-size:12px;color:var(--t3);font-family:var(--mono)">Current spread: ${((parseFloat(t.askPrice)-parseFloat(t.bidPrice))/parseFloat(t.askPrice)*100).toFixed(4)}% · Live data from Binance</div>
        </div>
        <!-- STATS -->
        <div class="tab-pane" id="tp-stats">
          <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
            ${[
              ['Last Price',fmtPrice(t.lastPrice)],
              ['24h Change',`<span style="color:${up?'var(--up)':'var(--dn)'}">${up?'+':''}${chg.toFixed(2)}%</span>`],
              ['24h High',`<span style="color:var(--up)">${fmtPrice(t.highPrice)}</span>`],
              ['24h Low',`<span style="color:var(--dn)">${fmtPrice(t.lowPrice)}</span>`],
              ['Open Price',fmtPrice(t.openPrice)],
              ['Prev Close',fmtPrice(t.prevClosePrice)],
              ['Best Bid',`<span style="color:var(--up)">${fmtPrice(t.bidPrice)}</span>`],
              ['Best Ask',`<span style="color:var(--dn)">${fmtPrice(t.askPrice)}</span>`],
              ['Base Volume',fn(t.volume,4)+' '+SYM],
              ['Quote Volume',fmtVol(t.quoteVolume)],
              ['Trade Count',parseInt(t.count).toLocaleString()],
              ['Avg Price',fmtPrice(t.weightedAvgPrice)],
            ].map(([k,v])=>`<div style="background:var(--s2);border:1px solid var(--border);border-radius:var(--rx);padding:12px 14px"><div style="font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--t3);font-weight:700;margin-bottom:5px">${k}</div><div style="font-family:var(--mono);font-size:14px;font-weight:600">${v}</div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div>
      <div class="card anim" style="margin-bottom:14px">
        <div class="card-hdr"><div class="card-title">Market Data</div></div>
        ${[
          ['Price',fmtPrice(t.lastPrice)],
          ['24h Change',`<span style="color:${up?'var(--up)':'var(--dn)'}">${up?'+':''}${chg.toFixed(2)}%`],
          ['24h Volume',fmtVol(t.quoteVolume)],
          ['24h High',fmtPrice(t.highPrice)],
          ['24h Low',fmtPrice(t.lowPrice)],
          ['Open Price',fmtPrice(t.openPrice)],
          ['Prev Close',fmtPrice(t.prevClosePrice)],
          ['Trades',parseInt(t.count).toLocaleString()],
          ['Avg Price',fmtPrice(t.weightedAvgPrice)],
          ['Bid / Ask',fmtPrice(t.bidPrice)+' / '+fmtPrice(t.askPrice)],
        ].map(([k,v])=>`<div class="side-stat"><div class="ss-row"><span class="ss-key">${k}</span><span class="ss-val">${v}</span></div></div>`).join('')}
      </div>
      <div class="card anim" style="margin-bottom:14px">
        <div class="card-hdr"><div class="card-title">Quick Trade</div></div>
        <div class="card-body">
          <div style="font-size:12.5px;color:var(--t3);margin-bottom:12px">Place a trade for <strong style="color:var(--t1)">${SYM}/USDT</strong> on Binance</div>
          <button class="btn-solid" style="width:100%;padding:12px;border-radius:var(--rx);font-size:14px;margin-bottom:8px" onclick="dt('Buy ${SYM}')">Buy ${SYM}</button>
          <button class="btn-outline" style="width:100%;padding:12px;border-radius:var(--rx);font-size:14px;color:var(--dn);border-color:var(--dn-border)" onclick="dt('Sell ${SYM}')">Sell ${SYM}</button>
          <div style="margin-top:12px;text-align:center;font-size:11.5px;color:var(--t4)">🚧 Trading — Website is in Development Phase</div>
        </div>
      </div>
    </div>
  </div>`;

  calcConv();
}

function renderBookRows(orders,side){
  if(!orders||!orders.length)return'<div style="color:var(--t3);font-size:12px;padding:8px 0">No data</div>';
  const maxQty=Math.max(...orders.map(o=>parseFloat(o[1])));
  return orders.slice(0,8).map(o=>{
    const price=parseFloat(o[0]),qty=parseFloat(o[1]);
    const pct=(qty/maxQty*100).toFixed(1);
    return`<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;font-family:var(--mono);font-size:12px;border-bottom:1px solid var(--border)">
      <span style="color:${side==='up'?'var(--up)':'var(--dn)'}">${parseFloat(price).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:6})}</span>
      <span style="color:var(--t2)">${parseFloat(qty).toFixed(4)}</span>
      <div style="width:50px;height:3px;background:var(--s4);border-radius:2px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${side==='up'?'var(--up)':'var(--dn)'};opacity:.5;border-radius:2px"></div></div>
    </div>`;
  }).join('');
}

function swTab(name,el){
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tp-'+name)?.classList.add('active');
  el.classList.add('active');
}

async function loadChart(interval,btn){
  document.querySelectorAll('.ip').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const cl=document.getElementById('CHART_LOADER');
  if(cl)cl.style.display='flex';
  const limitMap={'15m':96,'1h':48,'4h':60,'1d':90,'1w':52,'1M':24};
  const limit=limitMap[interval]||90;
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${PAIR}&interval=${interval}&limit=${limit}`);
    const klines=await r.json();
    if(!Array.isArray(klines)||!klines.length)throw new Error('No data');
    const closes=klines.map(k=>parseFloat(k[4]));
    const labels=klines.map(k=>{
      const d=new Date(k[0]);
      if(interval==='15m'||interval==='1h')return d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
      if(interval==='4h')return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit'});
      return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
    });
    const isUp=closes[closes.length-1]>=closes[0];
    const color=isUp?'#00C896':'#FF4560';
    const bgColor=isUp?'rgba(0,200,150,.06)':'rgba(255,69,96,.06)';
    if(chartInst){chartInst.destroy();chartInst=null;}
    const canvas=document.getElementById('PRICE_CHART');
    if(!canvas)return;
    chartInst=new Chart(canvas,{
      type:'line',
      data:{labels,datasets:[{data:closes,borderColor:color,backgroundColor:bgColor,fill:true,borderWidth:2,pointRadius:0,pointHoverRadius:4,tension:.2}]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          tooltip:{
            backgroundColor:'rgba(13,14,20,.95)',
            titleColor:'rgba(255,255,255,.5)',
            bodyColor:'#fff',
            bodyFont:{family:'JetBrains Mono',weight:'600',size:13},
            borderColor:'rgba(255,255,255,.1)',borderWidth:1,
            padding:12,cornerRadius:10,
            callbacks:{label:ctx=>'$'+ctx.parsed.y.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:6})}
          }
        },
        scales:{
          x:{grid:{display:false},ticks:{color:'#5C5D6E',font:{size:10,family:'JetBrains Mono'},maxTicksLimit:8,maxRotation:0}},
          y:{grid:{color:'rgba(255,255,255,.04)'},ticks:{color:'#5C5D6E',font:{size:10,family:'JetBrains Mono'},callback:v=>'$'+v.toLocaleString('en-US',{maximumFractionDigits:4})}}
        }
      }
    });
    const mn=Math.min(...closes),mx=Math.max(...closes),chgPct=((closes[closes.length-1]-closes[0])/closes[0]*100);
    const cs=document.getElementById('CHART_STATS');
    if(cs)cs.innerHTML=`
      <div class="cs-box"><div class="cs-label">Period High</div><div class="cs-val" style="color:var(--up)">${fmtPrice(mx)}</div></div>
      <div class="cs-box"><div class="cs-label">Period Low</div><div class="cs-val" style="color:var(--dn)">${fmtPrice(mn)}</div></div>
      <div class="cs-box"><div class="cs-label">Change</div><div class="cs-val" style="color:${chgPct>=0?'var(--up)':'var(--dn)'}">${chgPct>=0?'+':''}${chgPct.toFixed(2)}%</div></div>
      <div class="cs-box"><div class="cs-label">Candles</div><div class="cs-val">${closes.length}</div></div>`;
  }catch(e){const cs=document.getElementById('CHART_STATS');if(cs)cs.innerHTML='<div style="color:var(--t3);font-size:12px;grid-column:1/-1">Chart unavailable. Try another interval.</div>';}
  if(cl)cl.style.display='none';
}

function calcConv(){
  const amt=parseFloat(document.getElementById('CV_AMT')?.value)||1;
  const cur=document.getElementById('CV_CUR')?.value||'INR';
  const r=RATES[cur]||1,v=amt*cvPrice*r,s=RSYM[cur]||'$';
  const d=cur==='JPY'?s+fn(v,0):s+fn(v,2);
  const rV=document.getElementById('CV_RES_VAL');
  const rS=document.getElementById('CV_RES_SUB');
  if(rV)rV.textContent=d;
  if(rS)rS.textContent=`${RNAME[cur]||cur} · Rate: 1 ${SYM} = $${cvPrice.toLocaleString('en-US',{maximumFractionDigits:4})}`;
}
function swapConv(){toast('💱 Swap direction — coming soon!');}

function toggleWL(){
  const btn=document.getElementById('WL_BTN');
  if(WL.has(PAIR)){WL.delete(PAIR);if(btn){btn.textContent='☆';btn.classList.remove('on');}toast('Removed from watchlist');}
  else{WL.add(PAIR);if(btn){btn.textContent='★';btn.classList.add('on');}toast('⭐ Added to watchlist!');}
  localStorage.setItem('pd_wl',JSON.stringify([...WL]));
}

loadCoin();
// Auto-refresh ticker every 10s
setInterval(async()=>{
  try{
    const r=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${PAIR}`);
    const t=await r.json();
    if(!t.code){
      cvPrice=parseFloat(t.lastPrice);
      const priceEl=document.querySelector('.coin-price');
      if(priceEl)priceEl.textContent=fmtPrice(cvPrice);
    }
  }catch(e){}
},10000);
</script>
</body>
</html>
