<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coin Details — PublicDrop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F5F0;--s1:#FFF;--s2:#F0F0EA;--s3:#E5E5DE;--s4:#D8D8D0;--border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.12);--border3:rgba(0,0,0,.22);--t1:#0A0A0A;--t2:#555550;--t3:#888882;--t4:#BBBBB5;--up:#00905A;--up-dim:rgba(0,144,90,.08);--up-border:rgba(0,144,90,.2);--dn:#CC2233;--dn-dim:rgba(204,34,51,.08);--dn-border:rgba(204,34,51,.2);--shadow:0 2px 16px rgba(0,0,0,.08);--shadow-md:0 4px 24px rgba(0,0,0,.12);--mono:'JetBrains Mono',monospace;--r:14px;--rs:10px;--rx:8px;--rpill:999px;}
[data-theme="dark"]{--bg:#0A0A0C;--s1:#111115;--s2:#18181D;--s3:#1F1F26;--s4:#26262F;--border:rgba(255,255,255,.06);--border2:rgba(255,255,255,.1);--border3:rgba(255,255,255,.18);--t1:#F5F5F2;--t2:#9A9A94;--t3:#5A5A58;--t4:#35353A;--up:#00C896;--up-dim:rgba(0,200,150,.1);--up-border:rgba(0,200,150,.25);--dn:#FF4560;--dn-dim:rgba(255,69,96,.1);--dn-border:rgba(255,69,96,.25);--shadow:0 2px 16px rgba(0,0,0,.5);--shadow-md:0 4px 24px rgba(0,0,0,.6);}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
header{background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500;box-shadow:var(--shadow);}
.hdr{max-width:1440px;margin:0 auto;padding:0 20px;height:60px;display:flex;align-items:center;gap:14px;}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:var(--t1);border-radius:9px;display:flex;align-items:center;justify-content:center;}
.logo-mark svg{width:20px;height:20px;}
.logo-text{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.4px;color:var(--t1);}
.logo-text span{color:var(--t3);}
.back-btn{margin-left:auto;display:flex;align-items:center;gap:7px;padding:7px 14px;border-radius:var(--rpill);border:1.5px solid var(--border2);background:transparent;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;}
.back-btn:hover{border-color:var(--border3);color:var(--t1);background:var(--s2);}
.theme-toggle{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .2s;}
main{max-width:1440px;margin:0 auto;padding:32px 20px 80px;}
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:12.5px;color:var(--t3);}
.breadcrumb a{color:var(--t3);font-weight:600;text-decoration:none;transition:color .15s;}
.breadcrumb a:hover{color:var(--t1);}
/* COIN HERO */
.coin-hero{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:28px 32px;margin-bottom:18px;}
.coin-hero-row{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;}
.coin-left{display:flex;align-items:flex-start;gap:16px;}
.coin-img-lg{width:60px;height:60px;border-radius:50%;object-fit:cover;background:var(--s3);flex-shrink:0;}
.coin-fb-lg{width:60px;height:60px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--t2);flex-shrink:0;}
.coin-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;letter-spacing:-.8px;margin-bottom:4px;}
.badge-sym{background:var(--s3);color:var(--t2);border:1px solid var(--border2);font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.3px;padding:3px 9px;border-radius:var(--rpill);}
.coin-price-row{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;}
.coin-price{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;letter-spacing:-1.5px;}
.chg-pill{display:inline-flex;align-items:center;gap:3px;padding:5px 12px;border-radius:var(--rpill);font-size:13px;font-weight:700;font-family:var(--mono);}
.chg-up{background:var(--up-dim);color:var(--up);border:1px solid var(--up-border);}
.chg-dn{background:var(--dn-dim);color:var(--dn);border:1px solid var(--dn-border);}
.coin-actions{display:flex;gap:8px;align-items:flex-start;}
.wl-btn{width:36px;height:36px;border-radius:50%;border:1.5px solid var(--border2);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t3);transition:all .15s;}
.wl-btn:hover{border-color:var(--border3);color:#E8A000;}
.wl-btn.on{color:#E8A000;border-color:rgba(232,160,0,.3);background:rgba(232,160,0,.06);}
.quick-stats{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid var(--border);}
.qs{padding:16px 18px;border-right:1px solid var(--border);}
.qs:last-child{border-right:none;}
.qs-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:5px;}
.qs-val{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--t1);}
/* CHART */
.chart-card{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--r);padding:20px 22px;margin-bottom:18px;}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
.chart-hdr h3{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;}
.chart-btns{display:flex;gap:4px;}
.cb{padding:5px 12px;border-radius:var(--rpill);font-size:11.5px;font-weight:700;border:1.5px solid var(--border2);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s;font-family:var(--mono);}
.cb:hover,.cb.active{background:var(--t1);color:var(--bg);border-color:var(--t1);}
.chart-area{height:280px;position:relative;}
/* LOADING */
.loader{text-align:center;padding:52px 24px;}
.spin{width:32px;height:32px;border:2.5px solid var(--border2);border-top-color:var(--t1);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto 14px;}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:13px;color:var(--t3);font-weight:600;}
/* SK */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk{border-radius:5px;background:linear-gradient(90deg,var(--s2),var(--s3),var(--s2));background-size:200%;animation:shimmer 1.5s infinite;}
/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--t1);color:var(--bg);padding:10px 22px;border-radius:var(--rpill);font-size:13px;font-weight:700;box-shadow:var(--shadow-md);z-index:9999;transition:transform .36s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none;max-width:90vw;}
#toast.show{transform:translateX(-50%) translateY(0);}
/* RESPONSIVE */
@media(max-width:900px){.quick-stats{grid-template-columns:repeat(3,1fr)}.qs:nth-child(3){border-right:none}.coin-hero{padding:20px 18px}}
@media(max-width:640px){main{padding:14px 12px 70px}.quick-stats{grid-template-columns:repeat(2,1fr)}.qs:nth-child(2n){border-right:none}.coin-img-lg,.coin-fb-lg{width:44px;height:44px}.coin-price{font-size:26px}.chart-area{height:200px}.hdr{padding:0 12px}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a class="logo" href="index.html">
      <div class="logo-mark"><svg viewBox="0 0 24 24" fill="none"><path d="M4 12l4-4 4 4 4-4 4 4" stroke="var(--bg)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="logo-text">Public<span>Drop</span></div>
    </a>
    <a class="back-btn" href="index.html">← Back to Markets</a>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>
  </div>
</header>

<main>
  <div class="breadcrumb">
    <a href="index.html">Home</a>
    <span>›</span>
    <a href="index.html">Markets</a>
    <span>›</span>
    <span id="BRD_SYM">Loading…</span>
  </div>

  <div class="coin-hero" id="COIN_HERO">
    <div class="loader"><div class="spin"></div><div class="loader-text">Loading coin data…</div></div>
  </div>

  <div class="chart-card">
    <div class="chart-hdr">
      <h3 id="CHART_TITLE">Price Chart</h3>
      <div class="chart-btns">
        <button class="cb active" onclick="setRange('1h',this)">1H</button>
        <button class="cb" onclick="setRange('4h',this)">4H</button>
        <button class="cb" onclick="setRange('1d',this)">1D</button>
        <button class="cb" onclick="setRange('7d',this)">7D</button>
        <button class="cb" onclick="setRange('30d',this)">30D</button>
      </div>
    </div>
    <div class="chart-area"><canvas id="priceChart"></canvas></div>
  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
/* THEME */
function applyTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('pd_theme',t);document.getElementById('themeToggle').textContent=t==='dark'?'🌙':'☀️';}
function toggleTheme(){const cur=document.documentElement.getAttribute('data-theme')||'light';applyTheme(cur==='dark'?'light':'dark');}
(()=>applyTheme(localStorage.getItem('pd_theme')||'light'))();

/* TOAST */
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2500);}

/* PARAMS */
const params=new URLSearchParams(location.search);
const pair=params.get('pair')||'BTCUSDT';
const sym=pair.replace('USDT','');

document.getElementById('BRD_SYM').textContent=sym+'/USDT';
document.getElementById('CHART_TITLE').textContent=sym+' Price Chart';

/* COIN META */
const COIN_META={
  BTC:{name:'Bitcoin',img:'https://assets.coingecko.com/coins/images/1/thumb/bitcoin.png'},
  ETH:{name:'Ethereum',img:'https://assets.coingecko.com/coins/images/279/thumb/ethereum.png'},
  BNB:{name:'BNB',img:'https://assets.coingecko.com/coins/images/825/thumb/bnb-icon2_2x.png'},
  SOL:{name:'Solana',img:'https://assets.coingecko.com/coins/images/4128/thumb/solana.png'},
};

/* WATCHLIST */
const WL=new Set(JSON.parse(localStorage.getItem('pd_wl')||'[]'));

/* FETCH */
async function loadCoin(){
  try{
    const res=await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${pair}`);
    const d=await res.json();
    const meta=COIN_META[sym]||{name:sym,img:null};
    const price=parseFloat(d.lastPrice);
    const change=parseFloat(d.priceChangePercent);
    const high=parseFloat(d.highPrice);
    const low=parseFloat(d.lowPrice);
    const vol=parseFloat(d.quoteVolume);
    const up=change>=0;
    const imgEl=meta.img?`<img class="coin-img-lg" src="${meta.img}" onerror="this.outerHTML='<div class=coin-fb-lg>${sym[0]}</div>'" loading="lazy">`:`<div class="coin-fb-lg">${sym[0]}</div>`;
    const wlOn=WL.has(pair)?'on':'';
    const wlStar=WL.has(pair)?'★':'☆';
    document.getElementById('COIN_HERO').innerHTML=`
      <div class="coin-hero-row">
        <div class="coin-left">
          ${imgEl}
          <div>
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div class="coin-title">${meta.name}</div>
              <span class="badge-sym">${sym}</span>
            </div>
            <div class="coin-price-row">
              <div class="coin-price">$${formatPrice(price)}</div>
              <span class="chg-pill ${up?'chg-up':'chg-dn'}">${up?'▲':'▼'} ${Math.abs(change).toFixed(2)}%</span>
            </div>
          </div>
        </div>
        <div class="coin-actions">
          <button class="wl-btn ${wlOn}" id="wlBtn" onclick="toggleWL()" title="${WL.has(pair)?'Remove from':'Add to'} watchlist">${wlStar}</button>
        </div>
      </div>
      <div class="quick-stats">
        <div class="qs"><div class="qs-label">24h High</div><div class="qs-val" style="color:var(--up)">$${formatPrice(high)}</div></div>
        <div class="qs"><div class="qs-label">24h Low</div><div class="qs-val" style="color:var(--dn)">$${formatPrice(low)}</div></div>
        <div class="qs"><div class="qs-label">24h Volume</div><div class="qs-val">${formatVol(vol)}</div></div>
        <div class="qs"><div class="qs-label">Pair</div><div class="qs-val">${sym}/USDT</div></div>
        <div class="qs"><div class="qs-label">Change</div><div class="qs-val" style="color:${up?'var(--up)':'var(--dn)'}">${change>=0?'+':''}${change.toFixed(2)}%</div></div>
      </div>`;
    document.title=`${sym} — $${formatPrice(price)} | PublicDrop`;
    initChart(price);
  }catch(e){
    document.getElementById('COIN_HERO').innerHTML='<div class="loader"><div class="loader-text" style="color:var(--dn)">⚠️ Failed to load. <a href="index.html" style="color:var(--t1);font-weight:700">← Back to markets</a></div></div>';
  }
}

function formatPrice(p){
  if(p===0)return'0.00';
  if(p<0.0001)return p.toFixed(8);
  if(p<0.01)return p.toFixed(6);
  if(p<1)return p.toFixed(4);
  if(p<100)return p.toFixed(2);
  return p.toLocaleString('en-US',{maximumFractionDigits:2});
}
function formatVol(v){
  if(v>=1e9)return'$'+(v/1e9).toFixed(2)+'B';
  if(v>=1e6)return'$'+(v/1e6).toFixed(2)+'M';
  return'$'+(v/1e3).toFixed(1)+'K';
}

function toggleWL(){
  const btn=document.getElementById('wlBtn');
  if(WL.has(pair)){WL.delete(pair);btn.textContent='☆';btn.classList.remove('on');toast('Removed from watchlist');}
  else{WL.add(pair);btn.textContent='★';btn.classList.add('on');toast('⭐ Added to watchlist!');}
  localStorage.setItem('pd_wl',JSON.stringify([...WL]));
}

/* CHART */
let chartInstance=null;
function initChart(basePrice){
  const ctx=document.getElementById('priceChart');
  if(!ctx)return;
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const lineColor=isDark?'#F5F5F2':'#0A0A0A';
  const gridColor=isDark?'rgba(255,255,255,.05)':'rgba(0,0,0,.05)';
  const textColor=isDark?'#5A5A58':'#888882';
  const labels=[],values=[];
  for(let i=23;i>=0;i--){
    const t=new Date(Date.now()-i*3600000);
    labels.push(t.getHours().toString().padStart(2,'0')+':00');
    values.push(basePrice*(0.96+Math.random()*0.08));
  }
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'line',
    data:{labels,datasets:[{data:values,borderColor:lineColor,backgroundColor:isDark?'rgba(245,245,242,.06)':'rgba(10,10,10,.05)',borderWidth:2,fill:true,tension:0.4,pointRadius:0,pointHoverRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'$'+formatPrice(ctx.parsed.y)}}},scales:{x:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},maxTicksLimit:8},border:{display:false}},y:{grid:{color:gridColor},ticks:{color:textColor,font:{size:10},callback:v=>'$'+formatPrice(v),maxTicksLimit:5},border:{display:false}}}}
  });
}
function setRange(r,btn){
  document.querySelectorAll('.cb').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  toast('Chart range: '+r);
}

loadCoin();
setInterval(loadCoin,30000);
</script>
</body>
</html>
